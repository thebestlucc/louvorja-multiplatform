<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LouvorJA - Bible</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,'Times New Roman',serif;background:linear-gradient(135deg,#0a1628 0%,#1e3a5f 50%,#0a1628 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.container{padding:2rem;max-width:800px;width:100%}
.reference{font-size:1.1rem;text-transform:uppercase;letter-spacing:0.15em;color:#60a5fa;margin-bottom:1rem;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.text{font-size:2rem;font-weight:400;line-height:1.6;white-space:pre-line;font-style:italic;transition:opacity 0.4s ease}
.waiting{color:#60a5fa;font-size:1.2rem;opacity:0.6;font-style:normal;font-family:-apple-system,sans-serif}
.disconnected{color:#ef4444;font-size:1.2rem;font-style:normal;font-family:-apple-system,sans-serif}
@media(max-width:600px){.text{font-size:1.3rem}.reference{font-size:0.9rem}}

.alert-overlay {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 100;
  background: rgba(0, 0, 0, 0.8);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-weight: bold;
  font-size: 28px;
  padding: 12px 20px;
  display: none;
  overflow: hidden;
  white-space: nowrap;
}
.alert-overlay.ticker .alert-content {
  display: inline-block;
  padding-left: 100%;
  animation: ticker-scroll 15s linear infinite;
}
@keyframes ticker-scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>
</head>
<body>
<div class="container">
  <div id="reference" class="reference"></div>
  <div id="text" class="text"><span class="waiting">Waiting for content...</span></div>
</div>

<div id="alert-overlay" class="alert-overlay">
  <div id="alert-content" class="alert-content"></div>
</div>
<script>
let es = null;
let uiEs = null;
let reconnectTimer = null;
let uiReconnectTimer = null;
let uiLanguage = 'pt';
let lastStatusKey = 'waitingContent';
let lastStatusClass = 'waiting';
let lastPayload = null;

const I18N = {
  pt: {
    pageTitle: 'LouvorJA - Biblia',
    waitingContent: 'Aguardando conteudo...',
    disconnectedWaiting: 'Desconectado. Aguardando servidor...',
    disconnectedReconnecting: 'Desconectado. Reconectando...',
  },
  en: {
    pageTitle: 'LouvorJA - Bible',
    waitingContent: 'Waiting for content...',
    disconnectedWaiting: 'Disconnected. Waiting for server...',
    disconnectedReconnecting: 'Disconnected. Reconnecting...',
  },
  es: {
    pageTitle: 'LouvorJA - Biblia',
    waitingContent: 'Esperando contenido...',
    disconnectedWaiting: 'Desconectado. Esperando al servidor...',
    disconnectedReconnecting: 'Desconectado. Reconectando...',
  },
};

function normalizeLanguage(value) {
  if (value === 'en' || value === 'es') {
    return value;
  }
  return 'pt';
}

function tr(key) {
  const table = I18N[uiLanguage] || I18N.pt;
  return table[key] || I18N.pt[key] || key;
}

function applyAlert(payload) {
  if (!payload || typeof payload !== "object") return;
  const overlay = document.getElementById("alert-overlay");
  const content = document.getElementById("alert-content");
  if (!overlay || !content) return;

  const isVisible = Boolean(payload.isVisible ?? payload.is_visible);
  const isTicker = Boolean(payload.isTicker ?? payload.is_ticker);
  const text = safeText(payload.text);

  if (!isVisible || !text) {
    overlay.style.display = "none";
    return;
  }

  content.textContent = text;
  overlay.style.display = "block";
  if (isTicker) {
    overlay.classList.add("ticker");
    const duration = Math.max(10, Math.min(60, text.length / 5));
    content.style.animationDuration = duration + "s";
  } else {
    overlay.classList.remove("ticker");
    content.style.animationDuration = "";
  }
}

let alertEs = null;
function connectAlert() {
  if (alertEs) return;
  alertEs = new EventSource("/sse/alert");
  alertEs.onopen = function() {
    void fetchAlertSnapshot();
  };
  alertEs.onmessage = function(event) {
    try {
      applyAlert(JSON.parse(event.data));
    } catch (_) {}
  };
  alertEs.onerror = function() {
    if (alertEs) {
      alertEs.close();
      alertEs = null;
    }
    setTimeout(connectAlert, 3000);
  };
}

async function fetchAlertSnapshot() {
  try {
    const response = await fetch("/state/alert", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyAlert(data);
  } catch (_) {}
}

function applyStaticText() {
  document.title = tr('pageTitle');
}

function safeText(value) {
  return typeof value === 'string' ? value.trim() : '';
}

function applyLanguage(language) {
  const normalized = normalizeLanguage(language);
  if (normalized === uiLanguage) {
    return;
  }
  uiLanguage = normalized;
  applyStaticText();
  if (lastPayload) {
    applyPayload(lastPayload);
    return;
  }
  if (lastStatusKey) {
    setStatus(lastStatusKey, lastStatusClass);
  }
}

async function refreshUiLanguage() {
  try {
    const response = await fetch('/state/ui', { cache: 'no-store' });
    if (!response.ok) return;
    const data = await response.json();
    applyLanguage(data.language);
  } catch (_) {}
}

function setStatus(statusKey, cls) {
  lastStatusKey = statusKey;
  lastStatusClass = cls;
  lastPayload = null;
  const el = document.getElementById('text');
  el.textContent = '';
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = tr(statusKey);
  el.appendChild(span);
  document.getElementById('reference').textContent = '';
}

function applyPayload(d) {
  lastPayload = d;
  lastStatusKey = null;

  const reference = safeText(d.reference);
  const text = safeText(d.text);

  document.getElementById('reference').textContent = reference;
  if (text) {
    document.getElementById('text').textContent = text;
  } else {
    setStatus('waitingContent', 'waiting');
  }
}

async function fetchSnapshot() {
  try {
    const response = await fetch('/state/bible', { cache: 'no-store' });
    if (!response.ok) return;
    const data = await response.json();
    applyPayload(data);
  } catch (_) {}
}

async function isServerAvailable() {
  try {
    const response = await fetch('/status', { cache: 'no-store' });
    return response.ok;
  } catch (_) {
    return false;
  }
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    void connectIfAvailable();
  }, 1500);
}

function scheduleUiReconnect() {
  if (uiReconnectTimer) return;
  uiReconnectTimer = setTimeout(() => {
    uiReconnectTimer = null;
    connectUi();
  }, 1500);
}

async function connectIfAvailable() {
  await refreshUiLanguage();
  if (es) return;
  const ok = await isServerAvailable();
  if (!ok) {
    setStatus('disconnectedWaiting', 'disconnected');
    scheduleReconnect();
    return;
  }
  connect();
  connectUi();
}

function connect() {
  if (es) return;
  es = new EventSource('/sse/bible');

  es.onopen = function () {
    void fetchSnapshot();
    connectAlert();
  };

  es.onmessage = function (e) {
    try {
      applyPayload(JSON.parse(e.data));
    } catch (_) {}
  };

  es.onerror = function () {
    if (es) {
      es.close();
      es = null;
    }
    setStatus('disconnectedReconnecting', 'disconnected');
    scheduleReconnect();
  };
}

function connectUi() {
  if (uiEs) return;
  uiEs = new EventSource('/sse/ui');
  uiEs.onmessage = function (e) {
    try {
      const payload = JSON.parse(e.data);
      applyLanguage(payload.language);
    } catch (_) {}
  };
  uiEs.onerror = function () {
    if (uiEs) {
      uiEs.close();
      uiEs = null;
    }
    scheduleUiReconnect();
  };
}

applyStaticText();
setStatus('waitingContent', 'waiting');
void connectIfAvailable();

window.addEventListener('beforeunload', () => {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  if (uiReconnectTimer) clearTimeout(uiReconnectTimer);
  if (es) es.close();
  if (uiEs) uiEs.close();
  if (alertEs) alertEs.close();
});
</script>
</body>
</html>
