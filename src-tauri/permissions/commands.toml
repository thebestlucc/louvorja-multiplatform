# Permission definitions for LouvorJA commands

[[permission]]
identifier = "allow-music-commands"
description = "Allows all music related commands"
[permission.commands]
allow = [
    "get_hymn",
    "search_hymns",
    "search_all_hymns",
    "search_all_music",
    "get_albums",
