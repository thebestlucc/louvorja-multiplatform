<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LouvorJA - Bible</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,'Times New Roman',serif;background:linear-gradient(135deg,#0a1628 0%,#1e3a5f 50%,#0a1628 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.container{padding:2rem;max-width:800px;width:100%}
.reference{font-size:1.1rem;text-transform:uppercase;letter-spacing:0.15em;color:#60a5fa;margin-bottom:1rem;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.text{font-size:2rem;font-weight:400;line-height:1.6;white-space:pre-line;font-style:italic;transition:opacity 0.4s ease}
.waiting{color:#60a5fa;font-size:1.2rem;opacity:0.6;font-style:normal;font-family:-apple-system,sans-serif}
.disconnected{color:#ef4444;font-size:1.2rem;font-style:normal;font-family:-apple-system,sans-serif}
@media(max-width:600px){.text{font-size:1.3rem}.reference{font-size:0.9rem}}
</style>
</head>
<body>
<div class="container">
  <div id="reference" class="reference"></div>
  <div id="text" class="text"><span class="waiting">Waiting for content...</span></div>
</div>
<script>
let es = null;
let reconnectTimer = null;
let statusPoll = null;

function setStatus(msg, cls) {
  const el = document.getElementById('text');
  el.textContent = '';
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg;
  el.appendChild(span);
}

function applyPayload(d) {
  document.getElementById('reference').textContent = d.reference || '';
  if (d.text) {
    document.getElementById('text').textContent = d.text;
  } else {
    setStatus('Waiting for content...', 'waiting');
  }
}

async function fetchSnapshot() {
  try {
    const response = await fetch('/state/bible', { cache: 'no-store' });
    if (!response.ok) return;
    const data = await response.json();
    applyPayload(data);
  } catch (_) {}
}

async function isServerAvailable() {
  try {
    const response = await fetch('/status', { cache: 'no-store' });
    return response.ok;
  } catch (_) {
    return false;
  }
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    void connectIfAvailable();
  }, 1500);
}

async function connectIfAvailable() {
  if (es) return;
  const ok = await isServerAvailable();
  if (!ok) {
    setStatus('Disconnected. Waiting for server...', 'disconnected');
    return;
  }
  connect();
}

function connect() {
  es = new EventSource('/sse/bible');

  es.onopen = function () {
    void fetchSnapshot();
  };

  es.onmessage = function (e) {
    try {
      applyPayload(JSON.parse(e.data));
    } catch (_) {}
  };

  es.onerror = function () {
    if (es) {
      es.close();
      es = null;
    }
    setStatus('Disconnected. Reconnecting...', 'disconnected');
    scheduleReconnect();
  };
}

void connectIfAvailable();
statusPoll = setInterval(() => {
  if (!es) {
    void connectIfAvailable();
  }
}, 2000);

window.addEventListener('beforeunload', () => {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  if (statusPoll) clearInterval(statusPoll);
  if (es) es.close();
});
</script>
</body>
</html>
