<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LouvorJA - Music</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}
.screen {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.bg-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 180ms ease;
}
.bg-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.15);
  opacity: 0;
  transition: opacity 180ms ease;
  pointer-events: none;
}
.content {
  position: relative;
  z-index: 2;
  width: min(94vw, 1800px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 32px;
}
.label {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: rgba(255, 255, 255, 0.55);
  display: none;
}
.text-wrap {
  max-width: 92%;
}
.text-wrap.with-panel {
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.66);
  box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
  padding: 28px 34px;
}
.text {
  font-size: 58px;
  font-weight: 600;
  line-height: 1.15;
  white-space: pre-line;
}
.text.bible {
  font-family: Georgia, "Times New Roman", serif;
  font-weight: 500;
  line-height: 1.35;
}
.title {
  font-size: 24px;
  color: rgba(255, 255, 255, 0.78);
  display: none;
}
.image-media,
.video-media {
  display: none;
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.status {
  position: relative;
  z-index: 2;
  font-size: 20px;
  color: rgba(255, 255, 255, 0.6);
}
.status.error {
  color: #ef4444;
}
.gap-indicator {
  position: absolute;
  left: 50%;
  bottom: 44px;
  z-index: 3;
  width: min(42vw, 520px);
  transform: translateX(-50%);
  display: none;
  pointer-events: none;
}
.gap-indicator-shell {
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  background: rgba(0, 0, 0, 0.5);
  box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
  padding: 12px 14px;
  backdrop-filter: blur(10px);
}
.gap-indicator-track {
  position: relative;
  height: 6px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.16);
}
.gap-indicator-bar {
  position: absolute;
  inset: 0 auto 0 -36%;
  width: 36%;
  border-radius: 999px;
  background: linear-gradient(
    90deg,
    rgba(255, 255, 255, 0),
    rgba(167, 243, 208, 0.85),
    rgba(255, 255, 255, 1)
  );
  box-shadow: 0 0 18px rgba(167, 243, 208, 0.45);
  animation: gap-indicator-flow 1.55s ease-in-out infinite;
}
@keyframes gap-indicator-flow {
  0% {
    transform: translateX(0);
    opacity: 0.55;
  }
  50% {
    opacity: 1;
  }
  100% {
    transform: translateX(380%);
    opacity: 0.55;
  }
}
@media (max-width: 900px) {
  .content { padding: 20px; }
  .text-wrap.with-panel { padding: 20px 24px; }
  .gap-indicator {
    width: min(82vw, 420px);
    bottom: 28px;
  }
}

.alert-overlay {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 100;
  background: rgba(0, 0, 0, 0.8);
  color: #fff;
  font-weight: bold;
  font-size: 28px;
  padding: 12px 20px;
  display: none;
  overflow: hidden;
  white-space: nowrap;
}
.alert-overlay.ticker .alert-content {
  display: inline-block;
  padding-left: 100%;
  animation: ticker-scroll 15s linear infinite;
}
@keyframes ticker-scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>
</head>
<body>
<div class="screen">
  <img id="bg-image" class="bg-image" alt="">
  <div id="bg-overlay" class="bg-overlay"></div>

  <img id="image-media" class="image-media" alt="">
  <video id="video-media" class="video-media" autoplay muted loop playsinline></video>

  <div id="content" class="content" aria-live="polite">
    <div id="label" class="label"></div>
    <div id="text-wrap" class="text-wrap">
      <div id="text" class="text"></div>
    </div>
    <div id="title" class="title"></div>
  </div>

  <div id="alert-overlay" class="alert-overlay">
    <div id="alert-content" class="alert-content"></div>
  </div>

  <div id="gap-indicator" class="gap-indicator" aria-hidden="true">
    <div class="gap-indicator-shell">
      <div class="gap-indicator-track">
        <div class="gap-indicator-bar"></div>
      </div>
    </div>
  </div>

  <div id="status" class="status"></div>
</div>

<script>
let es = null;
let reconnectTimer = null;
let uiLanguage = "pt";
let lastRealPayload = null;
let lastCoverPayload = null;
let lastUtilityEvent = null;
let activeUtilitySessionId = null;
let lastAudioPlayback = null;
let lastGapTiming = null;

const I18N = {
  pt: {
    pageTitle: "LouvorJA - Musica",
    waitingContent: "Aguardando conteudo...",
    disconnectedWaiting: "Desconectado. Aguardando servidor...",
    disconnectedReconnecting: "Desconectado. Reconectando...",
    timerLabel: "Timer",
    countdownTitle: "Contagem regressiva",
    stopwatchTitle: "Cronometro",
    clockTitle: "Relogio"
  },
  en: {
    pageTitle: "LouvorJA - Music",
    waitingContent: "Waiting for content...",
    disconnectedWaiting: "Disconnected. Waiting for server...",
    disconnectedReconnecting: "Disconnected. Reconnecting...",
    timerLabel: "Timer",
    countdownTitle: "Countdown",
    stopwatchTitle: "Stopwatch",
    clockTitle: "Clock"
  },
  es: {
    pageTitle: "LouvorJA - Musica",
    waitingContent: "Esperando contenido...",
    disconnectedWaiting: "Desconectado. Esperando al servidor...",
    disconnectedReconnecting: "Desconectado. Reconectando...",
    timerLabel: "Temporizador",
    countdownTitle: "Cuenta regresiva",
    stopwatchTitle: "Cronometro",
    clockTitle: "Reloj"
  }
};

const DEFAULT_BACKGROUND = "#000";

function normalizeLanguage(value) {
  if (value === "en" || value === "es") return value;
  return "pt";
}

function tr(key) {
  const table = I18N[uiLanguage] || I18N.pt;
  return table[key] || I18N.pt[key] || key;
}

function localeFromLanguage(language) {
  if (language === "en") return "en-US";
  if (language === "es") return "es-ES";
  return "pt-BR";
}

function safeText(value) {
  return typeof value === "string" ? value.trim() : "";
}

function safeNumber(value) {
  const parsed = Number(value);
  return Number.isFinite(parsed) ? parsed : null;
}

function normalizeAudioPlaybackPayload(raw) {
  if (!raw || typeof raw !== "object") {
    return null;
  }

  const positionMs = safeNumber(raw.positionMs ?? raw.position_ms);
  const durationMs = safeNumber(raw.durationMs ?? raw.duration_ms);
  return {
    positionMs: positionMs ?? 0,
    durationMs,
    isPlaying: Boolean(raw.isPlaying),
    isPaused: Boolean(raw.isPaused)
  };
}

function extractGapTiming(payload) {
  if (!payload || typeof payload !== "object") {
    return null;
  }

  return {
    currentSlideStartMs: safeNumber(payload.currentSlideStartMs ?? payload.current_slide_start_ms),
    nextSlideStartMs: safeNumber(payload.nextSlideStartMs ?? payload.next_slide_start_ms),
    audioDurationMs: safeNumber(payload.audioDurationMs ?? payload.audio_duration_ms)
  };
}

function toStreamingMediaUrl(pathValue) {
  if (!pathValue) return "";
  const v = String(pathValue);
  if (v.startsWith("http://") || v.startsWith("https://") ||
      v.startsWith("data:") || v.startsWith("blob:")) {
    return v;
  }
  // encodeURIComponent encodes the full path including slashes and drive letters,
  // so /Users/user/bg.jpg → /media/%2FUsers%2Fuser%2Fbg.jpg
  // and media/videos/hash.mp4 → /media/media%2Fvideos%2Fhash.mp4
  return "/media/" + encodeURIComponent(v);
}

function getSlideType(payload) {
  return safeText(payload && (payload.slideType || payload.slide_type || payload.type)).toLowerCase();
}

function inferMediaType(path) {
  if (!path) return null;
  var normalized = path.replace(/\\/g, "/");
  var parts = normalized.split("/");
  var filename = parts[parts.length - 1] || "";
  var extParts = filename.split(".");
  var ext = extParts.length > 1 ? extParts[extParts.length - 1].split("?")[0].toLowerCase() : "";
  if (!ext) return null;
  var imageExts = ["jpg", "jpeg", "png", "gif", "webp", "svg", "bmp", "avif", "tiff"];
  var videoExts = ["mp4", "webm", "mov", "avi", "mkv", "ogv", "m4v"];
  if (imageExts.indexOf(ext) !== -1) return "image";
  if (videoExts.indexOf(ext) !== -1) return "video";
  return null;
}

function firstDefined(values) {
  for (const value of values) {
    if (value !== undefined && value !== null) {
      return value;
    }
  }
  return null;
}

function normalizeSlidePayload(raw) {
  if (!raw || typeof raw !== "object") {
    return null;
  }

  const source =
    raw.current && typeof raw.current === "object" && !raw.slideType && !raw.slide_type && !raw.type
      ? raw.current
      : raw;

  const slideType = safeText(source.slideType || source.slide_type || source.type);
  if (!slideType && !safeText(source.text) && !safeText(source.title) && !safeText(source.src)) {
    return null;
  }

  const text = firstDefined([source.text, source.lyrics, source.content, source.body]);
  const textSize = firstDefined([source.textSize, source.text_size, source.fontSize, source.font_size]);
  const videoPath = firstDefined([source.videoPath, source.video_path]);
  const imageSrc = firstDefined([source.src, source.imagePath, source.image_path]);
  const backgroundImage = firstDefined([source.backgroundImage, source.background_image]);
  const backgroundColor = firstDefined([source.backgroundColor, source.background_color]);
  const textColor = firstDefined([source.textColor, source.text_color]);
  const audioPath = firstDefined([source.audioPath, source.audio_path]);

  return {
    slideType: slideType || "text",
    label: safeText(source.label),
    text: typeof text === "string" ? text : "",
    title: safeText(source.title),
    subtitle: safeText(source.subtitle),
    videoPath: typeof videoPath === "string" ? videoPath : "",
    src: typeof imageSrc === "string" ? imageSrc : "",
    backgroundImage: typeof backgroundImage === "string" ? backgroundImage : "",
    backgroundColor: typeof backgroundColor === "string" ? backgroundColor : "",
    textColor: typeof textColor === "string" ? textColor : "",
    textSize: safeNumber(textSize) ?? 0,
    audioPath: typeof audioPath === "string" ? audioPath : ""
  };
}

function shouldReuseCoverPayload(slide) {
  if (!slide) return false;
  const slideType = getSlideType(slide);
  const hasContent = safeText(slide.text).length > 0 || safeText(slide.title).length > 0;
  return !hasContent && (slideType === "text" || slideType === "lyrics") && lastCoverPayload != null;
}

function resolveCoverFallbackPayload(slide) {
  if (!shouldReuseCoverPayload(slide) || !lastCoverPayload) {
    return slide;
  }

  return {
    ...slide,
    backgroundImage: slide.backgroundImage || lastCoverPayload.backgroundImage,
    backgroundColor: slide.backgroundColor || lastCoverPayload.backgroundColor,
    textColor: slide.textColor || lastCoverPayload.textColor,
    textSize: slide.textSize || lastCoverPayload.textSize,
  };
}

function hasVisualOnlySlide(slide) {
  if (!slide) return false;
  const slideType = getSlideType(slide);
  if (slideType !== "cover" && slideType !== "lyrics" && slideType !== "text") {
    return false;
  }
  return Boolean(toStreamingMediaUrl(slide.backgroundImage))
    || safeText(slide.backgroundColor).length > 0;
}

function isGapSlide(slide) {
  if (!slide) return false;
  const slideType = getSlideType(slide);
  if (slideType !== "text" && slideType !== "lyrics") {
    return false;
  }
  return safeText(slide.text).length === 0 && safeText(slide.title).length === 0;
}

function payloadSupportsUtility(payload, kind) {
  const normalized = normalizeSlidePayload(payload);
  if (!normalized) return false;
  const currentLabel = safeText(normalized.label).toLowerCase();
  if (kind === "countdown" || kind === "stopwatch") return currentLabel === "timer";
  if (kind === "clock") return currentLabel === "clock";
  return false;
}

function setGapIndicatorVisible(visible) {
  document.getElementById("gap-indicator").style.display = visible ? "block" : "none";
}

function setGapIndicatorProgress(progressRatio) {
  const bar = document.querySelector(".gap-indicator-bar");
  if (!bar) return;

  if (progressRatio == null) {
    bar.style.animation = "gap-indicator-flow 1.55s ease-in-out infinite";
    bar.style.left = "-36%";
    bar.style.transform = "";
    bar.style.width = "36%";
    return;
  }

  const percent = Math.max(10, Math.min(100, Math.round(progressRatio * 100)));
  bar.style.animation = "none";
  bar.style.left = "0";
  bar.style.transform = "none";
  bar.style.width = percent + "%";
}

function hasGapTimingWindow(timing) {
  if (!timing) {
    return false;
  }

  const startMs = timing.currentSlideStartMs;
  const endMs = timing.nextSlideStartMs;
  return startMs != null && endMs != null && endMs > startMs;
}

function resolveGapProgressRatio(timing, audioPlayback) {
  if (!hasGapTimingWindow(timing) || !audioPlayback) {
    return null;
  }

  const startMs = timing.currentSlideStartMs;
  const endMs = timing.nextSlideStartMs;

  const clampedPositionMs = Math.min(Math.max(audioPlayback.positionMs, startMs), endMs);
  return (clampedPositionMs - startMs) / (endMs - startMs);
}

function updateGapIndicator(slide) {
  if (!isGapSlide(slide) || !hasGapTimingWindow(lastGapTiming)) {
    setGapIndicatorVisible(false);
    return;
  }

  setGapIndicatorVisible(true);
  setGapIndicatorProgress(resolveGapProgressRatio(lastGapTiming, lastAudioPlayback));
}

function applyAudioPlayback(payload) {
  lastAudioPlayback = normalizeAudioPlaybackPayload(payload);
  if (lastUtilityEvent) {
    return;
  }
  if (lastRealPayload) {
    updateGapIndicator(resolveCoverFallbackPayload(lastRealPayload));
  }
}

function clearStatus() {
  const status = document.getElementById("status");
  status.textContent = "";
  status.className = "status";
}

function setStatus(key, isError) {
  resetVisualStyle();
  setGapIndicatorVisible(false);
  const content = document.getElementById("content");
  content.style.display = "none";
  const status = document.getElementById("status");
  status.textContent = tr(key);
  status.className = isError ? "status error" : "status";
}

function hideMedia() {
  const image = document.getElementById("image-media");
  const video = document.getElementById("video-media");
  image.removeAttribute("src");
  image.style.display = "none";
  video.pause();
  video.removeAttribute("src");
  video.style.display = "none";
}

function resetVisualStyle() {
  document.body.style.background = DEFAULT_BACKGROUND;
  setGapIndicatorVisible(false);
  const bgImage = document.getElementById("bg-image");
  const bgOverlay = document.getElementById("bg-overlay");
  bgImage.removeAttribute("src");
  bgImage.style.opacity = "0";
  bgOverlay.style.opacity = "0";
  hideMedia();
}

function resolveFontSize(baseSize, sourceSize, variant) {
  const hasExplicit = Number.isFinite(sourceSize);
  let scaled = baseSize;

  if (hasExplicit) {
    if (variant === "lyrics") {
      scaled = sourceSize * 2.8;
      return Math.max(58, Math.min(210, Math.round(scaled)));
    }
    if (variant === "cover") {
      scaled = sourceSize * 2.3;
      return Math.max(62, Math.min(220, Math.round(scaled)));
    }
    scaled = sourceSize * 2.0;
    return Math.max(28, Math.min(180, Math.round(scaled)));
  }

  return Math.round(baseSize);
}

function applyTextStyles(payload, slideType) {
  const text = document.getElementById("text");
  const title = document.getElementById("title");
  const sourceSize = safeNumber(payload.textSize);
  const textColor = safeText(payload.textColor);
  const variant = slideType === "lyrics" ? "lyrics" : slideType === "cover" ? "cover" : "text";
  const textSize = resolveFontSize(
    slideType === "cover" ? 64 : slideType === "lyrics" ? 58 : 42,
    sourceSize,
    variant
  );
  const titleSize = Math.max(16, Math.round((sourceSize || 40) * 1.1));

  text.style.fontSize = textSize + "px";
  title.style.fontSize = titleSize + "px";
  text.style.color = textColor || "";
  title.style.color = textColor ? textColor : "";
  title.style.opacity = textColor ? "0.78" : "";
}

function applyBackground(payload) {
  const backgroundColor = safeText(payload.backgroundColor);
  const backgroundImage = toStreamingMediaUrl(payload.backgroundImage);

  document.body.style.background = backgroundColor || DEFAULT_BACKGROUND;
  const bgImage = document.getElementById("bg-image");
  const bgOverlay = document.getElementById("bg-overlay");
  if (backgroundImage) {
    bgImage.src = backgroundImage;
    bgImage.style.opacity = "1";
    bgOverlay.style.opacity = "1";
  } else {
    bgImage.removeAttribute("src");
    bgImage.style.opacity = "0";
    bgOverlay.style.opacity = "0";
  }
}

function setTextPanel(enabled) {
  const wrap = document.getElementById("text-wrap");
  if (enabled) {
    wrap.classList.add("with-panel");
  } else {
    wrap.classList.remove("with-panel");
  }
}

function showImage(path) {
  const image = document.getElementById("image-media");
  image.src = path;
  image.style.display = "block";
}

function showVideo(path) {
  const video = document.getElementById("video-media");
  video.src = path;
  video.style.display = "block";
  const playResult = video.play();
  if (playResult && typeof playResult.catch === "function") {
    playResult.catch(function () {});
  }
}

function renderPayload(payload, persistRealPayload) {
  const normalizedSlide = normalizeSlidePayload(payload);
  const slide = resolveCoverFallbackPayload(normalizedSlide);
  if (!slide) {
    setStatus("waitingContent", false);
    return;
  }

  if (persistRealPayload) {
    lastRealPayload = normalizedSlide;
    lastGapTiming = extractGapTiming(payload);
    if (getSlideType(normalizedSlide) === "cover") {
      lastCoverPayload = normalizedSlide;
    }
  }

  clearStatus();
  const content = document.getElementById("content");
  content.style.display = "flex";
  hideMedia();

  applyBackground(slide);
  const slideType = getSlideType(slide);
  const label = safeText(slide.label);
  const text = safeText(slide.text);
  const title = safeText(slide.title);
  const subtitle = safeText(slide.subtitle);
  const showGapIndicator = isGapSlide(slide);

  const labelElement = document.getElementById("label");
  const textElement = document.getElementById("text");
  const titleElement = document.getElementById("title");

  textElement.classList.toggle("bible", slideType === "bible");
  labelElement.style.display = "none";
  titleElement.style.display = "none";
  textElement.textContent = "";

  applyTextStyles(slide, slideType);

  if (slideType === "image") {
    const imageSrc = toStreamingMediaUrl(slide.src || text);
    if (!imageSrc) {
      setStatus("waitingContent", false);
      return;
    }
    showImage(imageSrc);
    if (title) {
      titleElement.style.display = "block";
      titleElement.textContent = title;
    } else if (subtitle) {
      titleElement.style.display = "block";
      titleElement.textContent = subtitle;
    }
    return;
  }

  if (slideType === "video") {
    const videoSrc = toStreamingMediaUrl(slide.videoPath || slide.src);
    if (!videoSrc) {
      setStatus("waitingContent", false);
      return;
    }
    showVideo(videoSrc);
    if (text) {
      textElement.textContent = text;
      setTextPanel(true);
    } else {
      setTextPanel(false);
    }
    return;
  }

  // Extension-based fallback when slideType is not recognized — skip types that already handle backgroundImage as background
  if (slideType !== "image" && slideType !== "video" && slideType !== "cover" && slideType !== "lyrics" && slideType !== "text" && slideType !== "bible") {
    var bgInferred = inferMediaType(slide.backgroundImage);
    var vpInferred = inferMediaType(slide.videoPath);
    if (bgInferred === "image" || vpInferred === "image") {
      var imageSrc2 = toStreamingMediaUrl(slide.backgroundImage || slide.src);
      if (imageSrc2) {
        showImage(imageSrc2);
        if (title) {
          titleElement.style.display = "block";
          titleElement.textContent = title;
        }
        return;
      }
    }
    if (vpInferred === "video") {
      var videoSrc2 = toStreamingMediaUrl(slide.videoPath);
      if (videoSrc2) {
        showVideo(videoSrc2);
        return;
      }
    }
  }

  const panelEnabled =
    Boolean(toStreamingMediaUrl(slide.backgroundImage))
    && (slideType === "cover" || slideType === "lyrics");
  setTextPanel(panelEnabled);

  const renderGapSlide = function () {
    setTextPanel(false);
  };

  if (slideType === "bible" && title) {
    labelElement.style.display = "block";
    labelElement.textContent = title;
  } else if (label) {
    labelElement.style.display = "block";
    labelElement.textContent = label;
  }

  if (slideType === "cover") {
    const coverText = title || text;
    if (!coverText) {
      if (hasVisualOnlySlide(slide)) {
        renderGapSlide();
        return;
      }
      setStatus("waitingContent", false);
      return;
    }
    textElement.textContent = coverText;
    if (subtitle) {
      titleElement.style.display = "block";
      titleElement.textContent = subtitle;
    }
  } else {
    const mainText = text || title;
    if (!mainText) {
      if (showGapIndicator || hasVisualOnlySlide(slide)) {
        renderGapSlide();
        return;
      }
      setStatus("waitingContent", false);
      return;
    }
    textElement.textContent = mainText;
    if (subtitle) {
      titleElement.style.display = "block";
      titleElement.textContent = subtitle;
    } else if (slideType === "image" && title) {
      titleElement.style.display = "block";
      titleElement.textContent = title;
    }
  }

  if (lastUtilityEvent && payloadSupportsUtility(lastRealPayload, lastUtilityEvent.kind)) {
    applyUtilityEvent(lastUtilityEvent, true);
  }

  updateGapIndicator(slide);
}

function formatTimerValue(kind, valueMs) {
  const safeMs = Math.max(0, Math.floor(valueMs));
  const totalSeconds = Math.floor(safeMs / 1000);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  if (kind === "stopwatch") {
    const millis = safeMs % 1000;
    if (hours > 0) {
      return String(hours).padStart(2, "0")
        + ":" + String(minutes).padStart(2, "0")
        + ":" + String(seconds).padStart(2, "0")
        + "." + String(millis).padStart(3, "0");
    }
    return String(minutes).padStart(2, "0")
      + ":" + String(seconds).padStart(2, "0")
      + "." + String(millis).padStart(3, "0");
  }

  if (hours > 0) {
    return String(hours).padStart(2, "0")
      + ":" + String(minutes).padStart(2, "0")
      + ":" + String(seconds).padStart(2, "0");
  }
  return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
}

function formatClockTime(valueMs, use24Hour) {
  return new Date(Math.max(0, Math.floor(valueMs))).toLocaleTimeString(
    localeFromLanguage(uiLanguage),
    { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: !use24Hour }
  );
}

function formatClockDate(valueMs) {
  return new Date(Math.max(0, Math.floor(valueMs))).toLocaleDateString(
    localeFromLanguage(uiLanguage),
    { weekday: "long", year: "numeric", month: "long", day: "numeric" }
  );
}

function applyUtilityEvent(eventPayload, replayOnly) {
  if (!eventPayload || typeof eventPayload !== "object") return;

  const phase = safeText(eventPayload.phase).toLowerCase();
  const sessionId = safeText(eventPayload.sessionId);
  const kind = safeText(eventPayload.kind).toLowerCase();
  const valueMs = safeNumber(eventPayload.valueMs) || 0;
  const use24Hour = Boolean(eventPayload.use24Hour);
  const showDate = Boolean(eventPayload.showDate);

  if (phase !== "start" && phase !== "tick" && phase !== "stop") return;
  if (kind !== "countdown" && kind !== "stopwatch" && kind !== "clock") return;

  if (phase === "stop") {
    if (activeUtilitySessionId && sessionId && sessionId !== activeUtilitySessionId) return;
    activeUtilitySessionId = null;
    lastUtilityEvent = null;
    if (lastRealPayload) {
      renderPayload(lastRealPayload, false);
    }
    return;
  }

  if (phase === "start") {
    activeUtilitySessionId = sessionId || activeUtilitySessionId;
  } else if (phase === "tick") {
    if (activeUtilitySessionId && sessionId && sessionId !== activeUtilitySessionId) return;
    if (!activeUtilitySessionId && sessionId) activeUtilitySessionId = sessionId;
  }

  if (!replayOnly) {
    lastUtilityEvent = {
      phase: phase,
      sessionId: sessionId,
      kind: kind,
      valueMs: valueMs,
      use24Hour: use24Hour,
      showDate: showDate
    };
  }

  let valueText = "";
  let subtitleText = "";
  let labelText = "";
  const utilityLabel = kind === "clock" ? "clock" : "timer";

  if (kind === "countdown") {
    valueText = formatTimerValue("countdown", valueMs);
    subtitleText = tr("countdownTitle");
    labelText = tr("timerLabel");
  } else if (kind === "stopwatch") {
    valueText = formatTimerValue("stopwatch", valueMs);
    subtitleText = tr("stopwatchTitle");
    labelText = tr("timerLabel");
  } else {
    valueText = formatClockTime(valueMs, use24Hour);
    subtitleText = showDate ? formatClockDate(valueMs) : tr("clockTitle");
    labelText = tr("clockTitle");
  }

  const styleBase = payloadSupportsUtility(lastRealPayload, kind) && lastRealPayload
    ? (normalizeSlidePayload(lastRealPayload) || {})
    : {};

  renderPayload({
    slideType: "cover",
    videoPath: "",
    label: utilityLabel,
    text: "",
    title: valueText,
    subtitle: subtitleText,
    backgroundImage: styleBase.backgroundImage || "",
    backgroundColor: styleBase.backgroundColor || "",
    textColor: styleBase.textColor || "",
    textSize: styleBase.textSize || 0,
    audioPath: ""
  }, false);

  const labelElement = document.getElementById("label");
  labelElement.style.display = "block";
  labelElement.textContent = labelText;
}

function handleMusicStreamMessage(data) {
  if (!data || typeof data !== "object") return;
  if (data.utilityProjection && typeof data.utilityProjection === "object") {
    applyUtilityEvent(data.utilityProjection, false);
    return;
  }
  if (data.audioPlayback && typeof data.audioPlayback === "object") {
    applyAudioPlayback(data.audioPlayback);
    return;
  }
  renderPayload(data, true);
}

function applyStaticText() {
  document.title = tr("pageTitle");
}

function applyLanguage(language) {
  const normalized = normalizeLanguage(language);
  if (normalized === uiLanguage) return;
  uiLanguage = normalized;
  applyStaticText();
  if (lastRealPayload) {
    renderPayload(lastRealPayload, false);
  } else {
    setStatus("waitingContent", false);
  }
  if (lastUtilityEvent) {
    applyUtilityEvent(lastUtilityEvent, true);
  }
}

async function refreshUiLanguage() {
  try {
    const response = await fetch("/state/ui", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyLanguage(data.language);
  } catch (_) {}
}

async function fetchSnapshot() {
  try {
    const response = await fetch("/state/music", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    renderPayload(data, true);
  } catch (_) {}
}

async function fetchUtilitySnapshot() {
  try {
    const response = await fetch("/state/utility", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyUtilityEvent(data, false);
  } catch (_) {}
}

async function fetchAudioSnapshot() {
  try {
    const response = await fetch("/state/audio", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyAudioPlayback(data);
  } catch (_) {}
}

async function isServerAvailable() {
  try {
    const response = await fetch("/status", { cache: "no-store" });
    return response.ok;
  } catch (_) {
    return false;
  }
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(function () {
    reconnectTimer = null;
    void connectIfAvailable();
  }, 1500);
}

async function connectIfAvailable() {
  await refreshUiLanguage();
  if (es) return;
  const ok = await isServerAvailable();
  if (!ok) {
    setStatus("disconnectedWaiting", true);
    scheduleReconnect();
    return;
  }
  connect();
}

function applyAlert(payload) {
  if (!payload || typeof payload !== "object") return;
  const overlay = document.getElementById("alert-overlay");
  const content = document.getElementById("alert-content");
  if (!overlay || !content) return;

  const isVisible = Boolean(payload.isVisible ?? payload.is_visible);
  const isTicker = Boolean(payload.isTicker ?? payload.is_ticker);
  const text = safeText(payload.text);

  if (!isVisible || !text) {
    overlay.style.display = "none";
    return;
  }

  content.textContent = text;
  overlay.style.display = "block";
  if (isTicker) {
    overlay.classList.add("ticker");
    // Adjust animation duration based on text length
    const duration = Math.max(10, Math.min(60, text.length / 5));
    content.style.animationDuration = duration + "s";
  } else {
    overlay.classList.remove("ticker");
    content.style.animationDuration = "";
  }
}

let alertEs = null;
function connectAlert() {
  if (alertEs) return;
  alertEs = new EventSource("/sse/alert");
  alertEs.onopen = function() {
    void fetchAlertSnapshot();
  };
  alertEs.onmessage = function(event) {
    try {
      applyAlert(JSON.parse(event.data));
    } catch (_) {}
  };
  alertEs.onerror = function() {
    if (alertEs) {
      alertEs.close();
      alertEs = null;
    }
    setTimeout(connectAlert, 3000);
  };
}

async function fetchAlertSnapshot() {
  try {
    const response = await fetch("/state/alert", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyAlert(data);
  } catch (_) {}
}

function connect() {
  if (es) return;
  es = new EventSource("/sse/music");
  es.onopen = function () {
    void fetchSnapshot();
    void fetchUtilitySnapshot();
    void fetchAudioSnapshot();
    connectAlert();
  };
  es.onmessage = function (event) {
    try {
      handleMusicStreamMessage(JSON.parse(event.data));
    } catch (_) {}
  };
  es.onerror = function () {
    if (es) {
      es.close();
      es = null;
    }
    setStatus("disconnectedReconnecting", true);
    scheduleReconnect();
  };
}

applyStaticText();
resetVisualStyle();
setStatus("waitingContent", false);
void connectIfAvailable();
setInterval(function() { void refreshUiLanguage(); }, 30000);

window.addEventListener("beforeunload", function () {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  if (es) es.close();
  if (alertEs) alertEs.close();
});
</script>
</body>
