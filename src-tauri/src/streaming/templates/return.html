<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LouvorJA - Return Monitor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0a0a0a;
  color: #fff;
  overflow: hidden;
}
.return-root {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  gap: 0;
  padding: 12px;
  background: #0a0a0a;
}
.frame {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: #000;
}
.frame.current { flex: 7; }
.frame.next { flex: 3; background: #0f0f0f; border-color: rgba(255, 255, 255, 0.05); }

.bg-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 180ms ease;
}
.bg-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.15);
  opacity: 0;
  transition: opacity 180ms ease;
  pointer-events: none;
}
.panel {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}
.label {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: rgba(255, 255, 255, 0.55);
  display: none;
}
.text-wrap {
  max-width: 92%;
}
.text-wrap.with-panel {
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.66);
  box-shadow: 0 24px 70px rgba(0, 0, 0, 0.52);
  padding: 22px 28px;
}
.text {
  font-size: 38px;
  font-weight: 600;
  line-height: 1.2;
  white-space: pre-line;
}
.text.bible {
  font-family: Georgia, "Times New Roman", serif;
  font-weight: 500;
  line-height: 1.35;
}
.title {
  margin-top: 8px;
  font-size: 20px;
  color: rgba(255, 255, 255, 0.78);
  display: none;
}
.image-media,
.video-media {
  display: none;
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.meta-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 44px;
  padding: 0 8px;
  color: rgba(255, 255, 255, 0.88);
}
.meta-title {
  min-width: 0;
  max-width: 70%;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 14px;
  font-weight: 500;
}
.meta-right {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.62);
}
.next-badge {
  position: absolute;
  left: 10px;
  top: 8px;
  z-index: 3;
  border-radius: 4px;
  background: rgba(0, 0, 0, 0.62);
  padding: 4px 8px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.65);
}
.next-empty {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.35);
}
.status {
  font-size: 18px;
  color: rgba(255, 255, 255, 0.6);
}
.status.error { color: #ef4444; }
.gap-indicator {
  position: absolute;
  left: 50%;
  bottom: 20px;
  z-index: 4;
  width: min(50vw, 460px);
  transform: translateX(-50%);
  display: none;
  pointer-events: none;
}
.gap-indicator-shell {
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  background: rgba(0, 0, 0, 0.5);
  box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
  padding: 10px 12px;
  backdrop-filter: blur(10px);
}
.gap-indicator-track {
  position: relative;
  height: 6px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.16);
}
.gap-indicator-bar {
  position: absolute;
  inset: 0 auto 0 -36%;
  width: 36%;
  border-radius: 999px;
  background: linear-gradient(
    90deg,
    rgba(255, 255, 255, 0),
    rgba(167, 243, 208, 0.85),
    rgba(255, 255, 255, 1)
  );
  box-shadow: 0 0 18px rgba(167, 243, 208, 0.45);
  animation: gap-indicator-flow 1.55s ease-in-out infinite;
}
@keyframes gap-indicator-flow {
  0% {
    transform: translateX(0);
    opacity: 0.55;
  }
  50% {
    opacity: 1;
  }
  100% {
    transform: translateX(380%);
    opacity: 0.55;
  }
}
@media (max-width: 900px) {
  .return-root { padding: 8px; }
  .text-wrap.with-panel { padding: 16px 20px; }
  .gap-indicator {
    width: min(82vw, 360px);
    bottom: 14px;
  }
}

.alert-overlay {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 100;
  background: rgba(0, 0, 0, 0.8);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-weight: bold;
  font-size: 24px;
  padding: 8px 16px;
  display: none;
  overflow: hidden;
  white-space: nowrap;
}
.alert-overlay.ticker .alert-content {
  display: inline-block;
  padding-left: 100%;
  animation: ticker-scroll 15s linear infinite;
}
@keyframes ticker-scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>
</head>
<body>
<div class="return-root">
  <div class="frame current">
    <img id="cur-bg" class="bg-image" alt="">
    <div id="cur-overlay" class="bg-overlay"></div>
    <div id="cur-gap-indicator" class="gap-indicator" aria-hidden="true">
      <div class="gap-indicator-shell">
        <div class="gap-indicator-track">
          <div id="cur-gap-indicator-bar" class="gap-indicator-bar"></div>
        </div>
      </div>
    </div>
    <div id="cur-panel" class="panel">
      <div id="cur-label" class="label"></div>
      <img id="cur-image" class="image-media" alt="">
      <video id="cur-video" class="video-media" autoplay muted loop playsinline></video>
      <div id="cur-yt-container" class="video-media" style="display:none;position:relative;"></div>
      <div id="cur-text-wrap" class="text-wrap">
        <div id="cur-text" class="text"></div>
      </div>
      <div id="cur-title" class="title"></div>
      <div id="cur-status" class="status"></div>
    </div>
  </div>

  <div class="meta-bar">
    <div id="meta-title" class="meta-title"></div>
    <div class="meta-right">
      <span id="counter"></span>
      <span id="clock"></span>
    </div>
  </div>

  <div class="frame next">
    <img id="next-bg" class="bg-image" alt="">
    <div id="next-overlay" class="bg-overlay"></div>
    <div id="next-badge" class="next-badge"></div>
    <div id="next-panel" class="panel">
      <div id="next-label" class="label"></div>
      <img id="next-image" class="image-media" alt="">
      <video id="next-video" class="video-media" autoplay muted loop playsinline></video>
      <div id="next-text-wrap" class="text-wrap">
        <div id="next-text" class="text"></div>
      </div>
      <div id="next-title" class="title"></div>
      <div id="next-empty" class="next-empty"></div>
    </div>
  </div>
</div>

<div id="alert-overlay" class="alert-overlay">
  <div id="alert-content" class="alert-content"></div>
</div>

<script>
let es = null;
let videoEs = null;
let reconnectTimer = null;
let uiLanguage = "pt";
let lastRealPayload = null;
let lastCoverPayload = null;
let lastUtilityEvent = null;
let activeUtilitySessionId = null;
let clockTimer = null;
let lastAudioPlayback = null;

// YT.Player state for the current panel
var _ytPlayer = null;   // YT.Player instance
var _ytVideoId = null;  // currently loaded video id
var _ytReady = false;   // true once onReady fired
var _ytCmdQueue = [];   // commands queued before player is ready

const I18N = {
  pt: {
    pageTitle: "LouvorJA - Monitor de Retorno",
    waitingContent: "Aguardando conteudo...",
    disconnectedWaiting: "Desconectado. Aguardando servidor...",
    disconnectedReconnecting: "Desconectado. Reconectando...",
    nextSlide: "Proximo",
    noNextSlide: "Sem proximo slide",
    timerLabel: "Timer",
    countdownTitle: "Contagem regressiva",
    stopwatchTitle: "Cronometro",
    clockTitle: "Relogio"
  },
  en: {
    pageTitle: "LouvorJA - Return Monitor",
    waitingContent: "Waiting for content...",
    disconnectedWaiting: "Disconnected. Waiting for server...",
    disconnectedReconnecting: "Disconnected. Reconnecting...",
    nextSlide: "Next Slide",
    noNextSlide: "No next slide",
    timerLabel: "Timer",
    countdownTitle: "Countdown",
    stopwatchTitle: "Stopwatch",
    clockTitle: "Clock"
  },
  es: {
    pageTitle: "LouvorJA - Monitor de Retorno",
    waitingContent: "Esperando contenido...",
    disconnectedWaiting: "Desconectado. Esperando al servidor...",
    disconnectedReconnecting: "Desconectado. Reconectando...",
    nextSlide: "Siguiente",
    noNextSlide: "Sin proxima diapositiva",
    timerLabel: "Temporizador",
    countdownTitle: "Cuenta regresiva",
    stopwatchTitle: "Cronometro",
    clockTitle: "Reloj"
  }
};

// ── YouTube Player API ─────────────────────────────────────────────────────────
(function() {
  var tag = document.createElement("script");
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);
})();

function onYouTubeIframeAPIReady() {
  // API loaded; player created lazily in showCurYouTubePlayer
}

function _ytExec(fn) {
  if (_ytReady && _ytPlayer) {
    try { fn(_ytPlayer); } catch (_) {}
  } else {
    _ytCmdQueue.push(fn);
  }
}

function _ytFlushQueue() {
  var fns = _ytCmdQueue.splice(0);
  for (var i = 0; i < fns.length; i++) {
    try { fns[i](_ytPlayer); } catch (_) {}
  }
}

function showCurYouTubePlayer(videoId) {
  var container = document.getElementById("cur-yt-container");
  if (!container) return;

  // Reuse existing player for same video
  if (_ytPlayer && _ytVideoId === videoId) {
    container.style.display = "block";
    return;
  }

  // Destroy previous player
  if (_ytPlayer) {
    try { _ytPlayer.destroy(); } catch (_) {}
    _ytPlayer = null;
  }
  _ytReady = false;
  _ytCmdQueue = [];
  _ytVideoId = videoId;

  // Clear the container and add a fresh placeholder div for YT.Player
  while (container.firstChild) container.removeChild(container.firstChild);
  var placeholder = document.createElement("div");
  placeholder.id = "cur-yt-player";
  placeholder.style.width = "100%";
  placeholder.style.height = "100%";
  container.appendChild(placeholder);
  container.style.display = "block";

  function doCreate() {
    if (typeof YT === "undefined" || !YT.Player) {
      setTimeout(doCreate, 200);
      return;
    }
    _ytPlayer = new YT.Player("cur-yt-player", {
      videoId: videoId,
      host: "https://www.youtube-nocookie.com",
      width: "100%",
      height: "100%",
      playerVars: {
        autoplay: 1,
        controls: 0,
        rel: 0,
        modestbranding: 1,
        playsinline: 1,
        mute: 0,
        iv_load_policy: 3,
        cc_load_policy: 0
      },
      events: {
        onReady: function() {
          _ytReady = true;
          try { _ytPlayer.unMute(); } catch (_) {}
          // Make the iframe fill the container
          var iframe = _ytPlayer.getIframe();
          if (iframe) {
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
          }
          _ytFlushQueue();
        }
      }
    });
  }
  doCreate();
}

function destroyCurYouTubePlayer() {
  if (_ytPlayer) {
    try { _ytPlayer.destroy(); } catch (_) {}
    _ytPlayer = null;
  }
  _ytVideoId = null;
  _ytReady = false;
  _ytCmdQueue = [];
  var container = document.getElementById("cur-yt-container");
  if (container) {
    while (container.firstChild) container.removeChild(container.firstChild);
    container.style.display = "none";
  }
}

function normalizeLanguage(value) {
  if (value === "en" || value === "es") return value;
  return "pt";
}

function tr(key) {
  const table = I18N[uiLanguage] || I18N.pt;
  return table[key] || I18N.pt[key] || key;
}

function localeFromLanguage(language) {
  if (language === "en") return "en-US";
  if (language === "es") return "es-ES";
  return "pt-BR";
}

function safeText(value) {
  return typeof value === "string" ? value.trim() : "";
}

function safeNumber(value) {
  const parsed = Number(value);
  return Number.isFinite(parsed) ? parsed : null;
}

function normalizeAudioPlaybackPayload(raw) {
  if (!raw || typeof raw !== "object") {
    return null;
  }

  const positionMs = safeNumber(raw.positionMs ?? raw.position_ms);
  const durationMs = safeNumber(raw.durationMs ?? raw.duration_ms);
  return {
    positionMs: positionMs ?? 0,
    durationMs,
    isPlaying: Boolean(raw.isPlaying),
    isPaused: Boolean(raw.isPaused)
  };
}

function toStreamingMediaUrl(pathValue) {
  if (!pathValue) return "";
  const v = String(pathValue);
  if (v.startsWith("http://") || v.startsWith("https://") ||
      v.startsWith("data:") || v.startsWith("blob:")) {
    return v;
  }
  // encodeURIComponent encodes the full path including slashes and drive letters,
  // so /Users/user/bg.jpg → /media/%2FUsers%2Fuser%2Fbg.jpg
  // and media/videos/hash.mp4 → /media/media%2Fvideos%2Fhash.mp4
  return "/media/" + encodeURIComponent(v);
}

function getSlideType(payload) {
  return safeText(payload && (payload.slideType || payload.slide_type || payload.type)).toLowerCase();
}

function inferMediaType(path) {
  if (!path) return null;
  var normalized = path.replace(/\\/g, "/");
  var parts = normalized.split("/");
  var filename = parts[parts.length - 1] || "";
  var extParts = filename.split(".");
  var ext = extParts.length > 1 ? extParts[extParts.length - 1].split("?")[0].toLowerCase() : "";
  if (!ext) return null;
  var imageExts = ["jpg", "jpeg", "png", "gif", "webp", "svg", "bmp", "avif", "tiff"];
  var videoExts = ["mp4", "webm", "mov", "avi", "mkv", "ogv", "m4v"];
  if (imageExts.indexOf(ext) !== -1) return "image";
  if (videoExts.indexOf(ext) !== -1) return "video";
  return null;
}

function firstDefined(values) {
  for (const value of values) {
    if (value !== undefined && value !== null) {
      return value;
    }
  }
  return null;
}

function normalizeSlidePayload(raw) {
  if (!raw || typeof raw !== "object") {
    return null;
  }

  const slideType = safeText(raw.slideType || raw.slide_type || raw.type);
  if (!slideType && !safeText(raw.text) && !safeText(raw.title) && !safeText(raw.src)) {
    return null;
  }

  const text = firstDefined([raw.text, raw.lyrics, raw.content, raw.body]);
  const textSize = firstDefined([raw.textSize, raw.text_size, raw.fontSize, raw.font_size]);
  const videoPath = firstDefined([raw.videoPath, raw.video_path]);
  const imageSrc = firstDefined([raw.src, raw.imagePath, raw.image_path]);
  const backgroundImage = firstDefined([raw.backgroundImage, raw.background_image]);
  const backgroundColor = firstDefined([raw.backgroundColor, raw.background_color]);
  const textColor = firstDefined([raw.textColor, raw.text_color]);
  const audioPath = firstDefined([raw.audioPath, raw.audio_path]);
  const videoUrl = firstDefined([raw.videoUrl, raw.video_url]);
  const videoId = firstDefined([raw.videoId, raw.video_id]);
  const videoSource = firstDefined([raw.videoSource, raw.video_source]);
  const videoTitle = firstDefined([raw.videoTitle, raw.video_title]);

  return {
    slideType: slideType || "text",
    label: safeText(raw.label),
    text: typeof text === "string" ? text : "",
    title: safeText(raw.title),
    subtitle: safeText(raw.subtitle),
    videoPath: typeof videoPath === "string" ? videoPath : "",
    src: typeof imageSrc === "string" ? imageSrc : "",
    backgroundImage: typeof backgroundImage === "string" ? backgroundImage : "",
    backgroundColor: typeof backgroundColor === "string" ? backgroundColor : "",
    textColor: typeof textColor === "string" ? textColor : "",
    textSize: safeNumber(textSize) ?? 0,
    audioPath: typeof audioPath === "string" ? audioPath : "",
    videoUrl: typeof videoUrl === "string" ? videoUrl : "",
    videoId: typeof videoId === "string" ? videoId : "",
    videoSource: typeof videoSource === "string" ? videoSource : "",
    videoTitle: typeof videoTitle === "string" ? videoTitle : ""
  };
}

function hasVisualSlide(slide) {
  if (!slide) return false;
  const slideType = getSlideType(slide);
  if (slideType !== "cover" && slideType !== "lyrics" && slideType !== "text") {
    return false;
  }
  return Boolean(toStreamingMediaUrl(slide.backgroundImage))
    || safeText(slide.backgroundColor).length > 0;
}

function isGapSlide(slide) {
  if (!slide) return false;
  const slideType = getSlideType(slide);
  if (slideType !== "text" && slideType !== "lyrics") {
    return false;
  }
  return safeText(slide.text).length === 0
    && safeText(slide.title).length === 0
    && safeText(slide.label).length === 0;
}

function resolveCoverVisualPayload(slide) {
  if (!slide || !isGapSlide(slide) || !lastCoverPayload) {
    return slide;
  }

  return {
    ...slide,
    backgroundImage: slide.backgroundImage || lastCoverPayload.backgroundImage,
    backgroundColor: slide.backgroundColor || lastCoverPayload.backgroundColor,
    textColor: slide.textColor || lastCoverPayload.textColor,
    textSize: slide.textSize || lastCoverPayload.textSize,
  };
}

function extractGapTiming(payload) {
  if (!payload || typeof payload !== "object") {
    return null;
  }

  return {
    currentSlideStartMs: safeNumber(payload.currentSlideStartMs ?? payload.current_slide_start_ms),
    nextSlideStartMs: safeNumber(payload.nextSlideStartMs ?? payload.next_slide_start_ms),
    audioDurationMs: safeNumber(payload.audioDurationMs ?? payload.audio_duration_ms)
  };
}

function setCurrentGapIndicatorVisible(visible) {
  document.getElementById("cur-gap-indicator").style.display = visible ? "block" : "none";
}

function setCurrentGapIndicatorProgress(progressRatio) {
  const bar = document.getElementById("cur-gap-indicator-bar");
  if (!bar) return;

  if (progressRatio == null) {
    bar.style.animation = "gap-indicator-flow 1.55s ease-in-out infinite";
    bar.style.left = "-36%";
    bar.style.transform = "";
    bar.style.width = "36%";
    return;
  }

  const percent = Math.max(10, Math.min(100, Math.round(progressRatio * 100)));
  bar.style.animation = "none";
  bar.style.left = "0";
  bar.style.transform = "none";
  bar.style.width = percent + "%";
}

function hasGapTimingWindow(timing) {
  if (!timing) {
    return false;
  }

  const startMs = timing.currentSlideStartMs;
  const endMs = timing.nextSlideStartMs;
  return startMs != null && endMs != null && endMs > startMs;
}

function resolveGapProgressRatio(timing, audioPlayback) {
  if (!hasGapTimingWindow(timing) || !audioPlayback) {
    return null;
  }

  const startMs = timing.currentSlideStartMs;
  const endMs = timing.nextSlideStartMs;

  const clampedPositionMs = Math.min(Math.max(audioPlayback.positionMs, startMs), endMs);
  return (clampedPositionMs - startMs) / (endMs - startMs);
}

function updateCurrentGapIndicator(payload) {
  const timing = extractGapTiming(payload);
  const slide = resolveCoverVisualPayload(normalizeSlidePayload(payload && payload.current ? payload.current : payload));
  if (!slide || !isGapSlide(slide) || !hasGapTimingWindow(timing)) {
    setCurrentGapIndicatorVisible(false);
    return;
  }

  setCurrentGapIndicatorVisible(true);
  setCurrentGapIndicatorProgress(resolveGapProgressRatio(timing, lastAudioPlayback));
}

function applyAudioPlayback(payload) {
  lastAudioPlayback = normalizeAudioPlaybackPayload(payload);
  if (lastUtilityEvent) {
    return;
  }
  if (lastRealPayload) {
    updateCurrentGapIndicator(lastRealPayload);
  }
}

function payloadSupportsUtility(payload, kind) {
  if (!payload || typeof payload !== "object") {
    return false;
  }
  const current = normalizeSlidePayload(payload.current || payload);
  if (!current) {
    return false;
  }
  const label = safeText(current.label).toLowerCase();
  if (kind === "countdown" || kind === "stopwatch") return label === "timer";
  if (kind === "clock") return label === "clock";
  return false;
}

function resetPanel(prefix) {
  const frame = document.querySelector(prefix === "cur" ? ".frame.current" : ".frame.next");
  frame.style.background = prefix === "cur" ? "#000" : "#0f0f0f";

  const bg = document.getElementById(prefix + "-bg");
  const overlay = document.getElementById(prefix + "-overlay");
  bg.removeAttribute("src");
  bg.style.opacity = "0";
  overlay.style.opacity = "0";

  const image = document.getElementById(prefix + "-image");
  const video = document.getElementById(prefix + "-video");
  image.removeAttribute("src");
  image.style.display = "none";
  video.pause();
  video.removeAttribute("src");
  video.style.display = "none";

  // Destroy the YouTube player when resetting the current panel
  if (prefix === "cur") {
    destroyCurYouTubePlayer();
  }

  const label = document.getElementById(prefix + "-label");
  const text = document.getElementById(prefix + "-text");
  const title = document.getElementById(prefix + "-title");
  const wrap = document.getElementById(prefix + "-text-wrap");

  label.style.display = "none";
  label.textContent = "";
  text.textContent = "";
  text.classList.remove("bible");
  title.style.display = "none";
  title.textContent = "";
  wrap.classList.remove("with-panel");
}

function resolveFontSize(sourceSize, mode, variant) {
  const hasExplicit = Number.isFinite(sourceSize);
  let raw;

  if (hasExplicit) {
    if (mode === "current") {
      if (variant === "lyrics") {
        raw = sourceSize * 2.05;
        return Math.max(36, Math.min(700, Math.round(raw)));
      }
      if (variant === "cover") {
        raw = sourceSize * 1.8;
        return Math.max(40, Math.min(700, Math.round(raw)));
      }
      raw = sourceSize * 1.55;
      return Math.max(20, Math.min(500, Math.round(raw)));
    }

    if (variant === "lyrics") {
      raw = sourceSize * 1.3;
      return Math.max(20, Math.min(420, Math.round(raw)));
    }
    if (variant === "cover") {
      raw = sourceSize * 1.2;
      return Math.max(20, Math.min(440, Math.round(raw)));
    }
    raw = sourceSize * 1.1;
    return Math.max(14, Math.min(380, Math.round(raw)));
  }

  if (mode === "current") {
    if (variant === "lyrics") return 42;
    if (variant === "cover") return 46;
    return 28;
  }

  if (variant === "lyrics") return 24;
  if (variant === "cover") return 24;
  return 18;
}

function applyPanel(prefix, payload, mode) {
  resetPanel(prefix);

  const slide = resolveCoverVisualPayload(normalizeSlidePayload(payload));
  if (!slide) {
    return;
  }

  if (mode === "current" && hasVisualSlide(slide)) {
    lastCoverPayload = slide;
  }

  const slideType = getSlideType(slide);
  const label = safeText(slide.label);
  const text = safeText(slide.text);
  const title = safeText(slide.title);
  const subtitle = safeText(slide.subtitle);
  const backgroundColor = safeText(slide.backgroundColor);
  const backgroundImage = toStreamingMediaUrl(slide.backgroundImage);
  const textColor = safeText(slide.textColor);
  const sourceSize = safeNumber(slide.textSize);

  const frame = document.querySelector(prefix === "cur" ? ".frame.current" : ".frame.next");
  const bg = document.getElementById(prefix + "-bg");
  const overlay = document.getElementById(prefix + "-overlay");
  const panelLabel = document.getElementById(prefix + "-label");
  const panelText = document.getElementById(prefix + "-text");
  const panelTitle = document.getElementById(prefix + "-title");
  const panelWrap = document.getElementById(prefix + "-text-wrap");
  const panelImage = document.getElementById(prefix + "-image");
  const panelVideo = document.getElementById(prefix + "-video");

  frame.style.background = backgroundColor || (mode === "current" ? "#000" : "#0f0f0f");
  if (backgroundImage) {
    bg.src = backgroundImage;
    bg.style.opacity = "1";
    overlay.style.opacity = "1";
  }

  const variant = slideType === "lyrics" ? "lyrics" : slideType === "cover" ? "cover" : "text";
  panelText.style.fontSize = resolveFontSize(sourceSize, mode, variant) + "px";
  panelText.style.color = textColor || "";
  panelTitle.style.fontSize = Math.max(12, Math.round(resolveFontSize(sourceSize, mode, "text") * 0.56)) + "px";
  panelTitle.style.color = textColor || "";
  panelTitle.style.opacity = textColor ? "0.8" : "";
  panelText.classList.toggle("bible", slideType === "bible");

  if (slideType === "image") {
    const src = toStreamingMediaUrl(slide.src || text);
    if (src) {
      panelImage.src = src;
      panelImage.style.display = "block";
    }
    if (title) {
      panelTitle.style.display = "block";
      panelTitle.textContent = title;
    }
    return;
  }

  if (slideType === "video") {
    const videoSrc = toStreamingMediaUrl(slide.videoPath || slide.src);
    if (mode === "next") {
      panelText.textContent = title || safeText(slide.videoPath);
      if (!panelText.textContent) {
        panelText.textContent = "Video";
      }
      if (label) {
        panelLabel.style.display = "block";
        panelLabel.textContent = label;
      }
      return;
    }
    if (videoSrc) {
      panelVideo.src = videoSrc;
      panelVideo.style.display = "block";
      const playResult = panelVideo.play();
      if (playResult && typeof playResult.catch === "function") {
        playResult.catch(function () {});
      }
    }
    if (text) {
      panelText.textContent = text;
      panelWrap.classList.add("with-panel");
    }
    return;
  }

  if (slideType === "online_video") {
    var videoTitleText = safeText(slide.videoTitle) || safeText(slide.videoId) || "Online Video";
    panelText.textContent = videoTitleText;
    if (mode === "next") {
      panelLabel.style.display = "block";
      panelLabel.textContent = "Online Video";
      if (slide.videoId) {
        var nextThumbUrl = "https://i.ytimg.com/vi/" + encodeURIComponent(slide.videoId) + "/hqdefault.jpg";
        panelImage.src = nextThumbUrl;
        panelImage.style.display = "block";
      }
      return;
    }
    // Current panel: play local video (unmuted) or embed YouTube via YT.Player API (unmuted)
    panelLabel.style.display = "block";
    panelLabel.textContent = "Online Video";
    var vSource = safeText(slide.videoSource);
    var vUrl = safeText(slide.videoUrl);
    var vId = safeText(slide.videoId);
    if (vSource === "local" && vUrl) {
      var localSrc = toStreamingMediaUrl(vUrl);
      if (localSrc) {
        panelVideo.muted = false;
        panelVideo.src = localSrc;
        panelVideo.style.display = "block";
        var pr = panelVideo.play();
        if (pr && typeof pr.catch === "function") pr.catch(function () {});
        return;
      }
    }
    if (vId) {
      // Use YT.Player API for reliable sync on streaming screens
      showCurYouTubePlayer(vId);
    } else {
      // Fallback: show thumbnail
      var thumbUrl = "https://i.ytimg.com/vi/" + encodeURIComponent(videoTitleText) + "/hqdefault.jpg";
      if (slide.videoId) {
        panelImage.src = "https://i.ytimg.com/vi/" + encodeURIComponent(slide.videoId) + "/hqdefault.jpg";
        panelImage.style.display = "block";
      }
    }
    return;
  }

  // Extension-based fallback when slideType is not recognized as media — skip types that already handle backgroundImage as background
  if (slideType !== "image" && slideType !== "video" && slideType !== "online_video" && slideType !== "cover" && slideType !== "lyrics" && slideType !== "text" && slideType !== "bible") {
    var bgInferred2 = inferMediaType(slide.backgroundImage);
    var vpInferred2 = inferMediaType(slide.videoPath);
    if (bgInferred2 === "image") {
      var imgSrc2 = toStreamingMediaUrl(slide.backgroundImage || slide.src);
      if (imgSrc2) {
        panelImage.src = imgSrc2;
        panelImage.style.display = "block";
        if (title) {
          panelTitle.style.display = "block";
          panelTitle.textContent = title;
        }
        return;
      }
    }
    if (vpInferred2 === "video" && mode !== "next") {
      var vidSrc2 = toStreamingMediaUrl(slide.videoPath);
      if (vidSrc2) {
        panelVideo.src = vidSrc2;
        panelVideo.style.display = "block";
        var pr = panelVideo.play();
        if (pr && typeof pr.catch === "function") { pr.catch(function(){}); }
        return;
      }
    }
  }

  if (slideType === "bible" && title) {
    panelLabel.style.display = "block";
    panelLabel.textContent = title;
  } else if (label) {
    panelLabel.style.display = "block";
    panelLabel.textContent = label;
  }

  if (mode === "current" && backgroundImage && (slideType === "cover" || slideType === "lyrics")) {
    panelWrap.classList.add("with-panel");
  }

  if (slideType === "cover") {
    const coverValue = title || text;
    panelText.textContent = coverValue;
    if (subtitle) {
      panelTitle.style.display = "block";
      panelTitle.textContent = subtitle;
    }
  } else {
    panelText.textContent = text || title;
    if (subtitle) {
      panelTitle.style.display = "block";
      panelTitle.textContent = subtitle;
    }
  }
}

function setCurrentStatus(key, isError) {
  resetPanel("cur");
  setCurrentGapIndicatorVisible(false);
  const status = document.getElementById("cur-status");
  status.textContent = tr(key);
  status.className = isError ? "status error" : "status";
  document.getElementById("meta-title").textContent = "";
  document.getElementById("counter").textContent = "";
}

function clearCurrentStatus() {
  const status = document.getElementById("cur-status");
  status.textContent = "";
  status.className = "status";
}

function updateMeta(payload) {
  const effectiveTitle = safeText(payload && payload.title);
  document.getElementById("meta-title").textContent = effectiveTitle;
  if (payload && Number.isFinite(payload.total) && payload.total > 0) {
    document.getElementById("counter").textContent = (payload.index + 1) + " / " + payload.total;
  } else {
    document.getElementById("counter").textContent = "";
  }
}

function applyPayload(payload, persistRealPayload) {
  if (!payload || typeof payload !== "object") {
    setCurrentStatus("waitingContent", false);
    return;
  }

  const hasEnvelopeShape =
    (payload.current && typeof payload.current === "object")
    || payload.current === null
    || payload.next !== undefined;
  const normalizedPayload = hasEnvelopeShape
    ? payload
    : {
      current: payload,
      next: null,
      index: 0,
      total: 1,
      title: safeText(payload.title) || safeText(payload.label),
    };

  if (persistRealPayload) {
    lastRealPayload = normalizedPayload;
  }

  clearCurrentStatus();
  updateMeta(normalizedPayload);

  if (normalizedPayload.current) {
    applyPanel("cur", normalizedPayload.current, "current");
    updateCurrentGapIndicator(normalizedPayload);
  } else {
    setCurrentGapIndicatorVisible(false);
    setCurrentStatus("waitingContent", false);
  }

  if (normalizedPayload.next) {
    document.getElementById("next-empty").textContent = "";
    applyPanel("next", normalizedPayload.next, "next");
  } else {
    resetPanel("next");
    document.getElementById("next-empty").textContent = tr("noNextSlide");
  }

  if (lastUtilityEvent && payloadSupportsUtility(lastRealPayload, lastUtilityEvent.kind)) {
    applyUtilityEvent(lastUtilityEvent, true);
  }
}

function formatTimerValue(kind, valueMs) {
  const safeMs = Math.max(0, Math.floor(valueMs));
  const totalSeconds = Math.floor(safeMs / 1000);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  if (kind === "stopwatch") {
    const millis = safeMs % 1000;
    if (hours > 0) {
      return String(hours).padStart(2, "0")
        + ":" + String(minutes).padStart(2, "0")
        + ":" + String(seconds).padStart(2, "0")
        + "." + String(millis).padStart(3, "0");
    }
    return String(minutes).padStart(2, "0")
      + ":" + String(seconds).padStart(2, "0")
      + "." + String(millis).padStart(3, "0");
  }

  if (hours > 0) {
    return String(hours).padStart(2, "0")
      + ":" + String(minutes).padStart(2, "0")
      + ":" + String(seconds).padStart(2, "0");
  }
  return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
}

function formatClockTime(valueMs, use24Hour) {
  return new Date(Math.max(0, Math.floor(valueMs))).toLocaleTimeString(
    localeFromLanguage(uiLanguage),
    { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: !use24Hour }
  );
}

function formatClockDate(valueMs) {
  return new Date(Math.max(0, Math.floor(valueMs))).toLocaleDateString(
    localeFromLanguage(uiLanguage),
    { weekday: "long", year: "numeric", month: "long", day: "numeric" }
  );
}

function applyUtilityEvent(eventPayload, replayOnly) {
  if (!eventPayload || typeof eventPayload !== "object") return;

  const phase = safeText(eventPayload.phase).toLowerCase();
  const sessionId = safeText(eventPayload.sessionId);
  const kind = safeText(eventPayload.kind).toLowerCase();
  const valueMs = safeNumber(eventPayload.valueMs) || 0;
  const use24Hour = Boolean(eventPayload.use24Hour);
  const showDate = Boolean(eventPayload.showDate);

  if (phase !== "start" && phase !== "tick" && phase !== "stop") return;
  if (kind !== "countdown" && kind !== "stopwatch" && kind !== "clock") return;

  if (phase === "stop") {
    if (activeUtilitySessionId && sessionId && sessionId !== activeUtilitySessionId) return;
    activeUtilitySessionId = null;
    lastUtilityEvent = null;
    if (lastRealPayload) {
      applyPayload(lastRealPayload, false);
    }
    return;
  }

  if (phase === "start") {
    activeUtilitySessionId = sessionId || activeUtilitySessionId;
  } else if (phase === "tick") {
    if (activeUtilitySessionId && sessionId && sessionId !== activeUtilitySessionId) return;
    if (!activeUtilitySessionId && sessionId) activeUtilitySessionId = sessionId;
  }

  if (!replayOnly) {
    lastUtilityEvent = {
      phase: phase,
      sessionId: sessionId,
      kind: kind,
      valueMs: valueMs,
      use24Hour: use24Hour,
      showDate: showDate
    };
  }

  let valueText = "";
  let subtitleText = "";
  let utilityTitle = "";
  let utilityLabel = "";

  if (kind === "countdown") {
    valueText = formatTimerValue("countdown", valueMs);
    subtitleText = tr("countdownTitle");
    utilityTitle = subtitleText;
    utilityLabel = tr("timerLabel");
  } else if (kind === "stopwatch") {
    valueText = formatTimerValue("stopwatch", valueMs);
    subtitleText = tr("stopwatchTitle");
    utilityTitle = subtitleText;
    utilityLabel = tr("timerLabel");
  } else {
    valueText = formatClockTime(valueMs, use24Hour);
    subtitleText = showDate ? formatClockDate(valueMs) : tr("clockTitle");
    utilityTitle = tr("clockTitle");
    utilityLabel = utilityTitle;
  }

  const baseCurrent = payloadSupportsUtility(lastRealPayload, kind) && lastRealPayload
    ? (normalizeSlidePayload(lastRealPayload.current || lastRealPayload) || {})
    : {};

  setCurrentGapIndicatorVisible(false);
  applyPanel("cur", {
    slideType: "cover",
    videoPath: "",
    label: kind === "clock" ? "clock" : "timer",
    text: "",
    title: valueText,
    subtitle: subtitleText,
    backgroundImage: baseCurrent.backgroundImage || "",
    backgroundColor: baseCurrent.backgroundColor || "",
    textColor: baseCurrent.textColor || "",
    textSize: baseCurrent.textSize || 0,
    audioPath: ""
  }, "current");

  document.getElementById("cur-label").style.display = "block";
  document.getElementById("cur-label").textContent = utilityLabel;
  document.getElementById("meta-title").textContent = utilityTitle;
}

function handleReturnStreamMessage(data) {
  if (!data || typeof data !== "object") return;
  if (data.utilityProjection && typeof data.utilityProjection === "object") {
    applyUtilityEvent(data.utilityProjection, false);
    return;
  }
  if (data.audioPlayback && typeof data.audioPlayback === "object") {
    applyAudioPlayback(data.audioPlayback);
    return;
  }
  applyPayload(data, true);
}

function applyAlert(payload) {
  if (!payload || typeof payload !== "object") return;
  const overlay = document.getElementById("alert-overlay");
  const content = document.getElementById("alert-content");
  if (!overlay || !content) return;

  const isVisible = Boolean(payload.isVisible ?? payload.is_visible);
  const isTicker = Boolean(payload.isTicker ?? payload.is_ticker);
  const text = safeText(payload.text);

  if (!isVisible || !text) {
    overlay.style.display = "none";
    return;
  }

  content.textContent = text;
  overlay.style.display = "block";
  if (isTicker) {
    overlay.classList.add("ticker");
    const duration = Math.max(10, Math.min(60, text.length / 5));
    content.style.animationDuration = duration + "s";
  } else {
    overlay.classList.remove("ticker");
    content.style.animationDuration = "";
  }
}

function applyVideoEvent(data) {
  if (!data || typeof data !== "object") return;
  var action = (data.action || "").toLowerCase();
  var ct = (data.currentTime != null) ? parseFloat(data.currentTime) : null;

  var curVideo = document.getElementById("cur-video");

  if (action === "clear") {
    destroyCurYouTubePlayer();
    if (curVideo && curVideo.getAttribute("src")) {
      curVideo.pause();
      curVideo.removeAttribute("src");
      curVideo.style.display = "none";
    }
    return;
  }

  // Local video sync
  if (curVideo && curVideo.getAttribute("src") && curVideo.style.display !== "none") {
    if (action === "play") {
      curVideo.play().catch(function () {});
    } else if (action === "pause") {
      curVideo.pause();
    } else if (action === "seek" && ct != null) {
      curVideo.currentTime = ct;
    } else if (action === "state") {
      if (ct != null && Math.abs(curVideo.currentTime - ct) > 1.5) {
        curVideo.currentTime = ct;
      }
      if (data.paused === true && !curVideo.paused) {
        curVideo.pause();
      } else if (data.paused === false && curVideo.paused) {
        curVideo.play().catch(function () {});
      }
    }
    return;
  }

  // YouTube sync via YT.Player API (commands queued until onReady)
  if (_ytPlayer || _ytVideoId) {
    if (action === "play") {
      _ytExec(function(p) { p.playVideo(); });
    } else if (action === "pause") {
      _ytExec(function(p) { p.pauseVideo(); });
    } else if (action === "seek" && ct != null) {
      _ytExec(function(p) { p.seekTo(ct, true); });
    } else if (action === "state") {
      var paused = data.paused;
      _ytExec(function(p) {
        if (ct != null) { p.seekTo(ct, true); }
        if (paused === false) { p.playVideo(); }
        else if (paused === true) { p.pauseVideo(); }
      });
    }
  }
}

async function fetchVideoSnapshot() {
  try {
    const response = await fetch("/state/video", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyVideoEvent(data);
  } catch (_) {}
}

function connectVideo() {
  if (videoEs) return;
  videoEs = new EventSource("/sse/video");
  videoEs.onopen = function () {
    void fetchVideoSnapshot();
  };
  videoEs.onmessage = function (event) {
    try {
      applyVideoEvent(JSON.parse(event.data));
    } catch (_) {}
  };
  videoEs.onerror = function () {
    if (videoEs) {
      videoEs.close();
      videoEs = null;
    }
    setTimeout(connectVideo, 3000);
  };
}

let alertEs = null;
function connectAlert() {
  if (alertEs) return;
  alertEs = new EventSource("/sse/alert");
  alertEs.onopen = function() {
    void fetchAlertSnapshot();
  };
  alertEs.onmessage = function(event) {
    try {
      applyAlert(JSON.parse(event.data));
    } catch (_) {}
  };
  alertEs.onerror = function() {
    if (alertEs) {
      alertEs.close();
      alertEs = null;
    }
    setTimeout(connectAlert, 3000);
  };
}

async function fetchAlertSnapshot() {
  try {
    const response = await fetch("/state/alert", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyAlert(data);
  } catch (_) {}
}

function applyStaticText() {
  document.title = tr("pageTitle");
  document.getElementById("next-badge").textContent = tr("nextSlide");
  if (!lastRealPayload || !lastRealPayload.next) {
    document.getElementById("next-empty").textContent = tr("noNextSlide");
  }
}

function updateClock() {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString(
    localeFromLanguage(uiLanguage),
    { hour: "2-digit", minute: "2-digit", second: "2-digit" }
  );
}

function applyLanguage(language) {
  const normalized = normalizeLanguage(language);
  if (normalized === uiLanguage) return;
  uiLanguage = normalized;
  applyStaticText();
  updateClock();

  if (lastRealPayload) {
    applyPayload(lastRealPayload, false);
  } else {
    setCurrentStatus("waitingContent", false);
  }
  if (lastUtilityEvent) {
    applyUtilityEvent(lastUtilityEvent, true);
  }
}

async function refreshUiLanguage() {
  try {
    const response = await fetch("/state/ui", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyLanguage(data.language);
  } catch (_) {}
}

async function fetchSnapshot() {
  try {
    const response = await fetch("/state/return", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyPayload(data, true);
  } catch (_) {}
}

async function fetchUtilitySnapshot() {
  try {
    const response = await fetch("/state/utility", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyUtilityEvent(data, false);
  } catch (_) {}
}

async function fetchAudioSnapshot() {
  try {
    const response = await fetch("/state/audio", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    applyAudioPlayback(data);
  } catch (_) {}
}

async function isServerAvailable() {
  try {
    const response = await fetch("/status", { cache: "no-store" });
    return response.ok;
  } catch (_) {
    return false;
  }
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(function () {
    reconnectTimer = null;
    void connectIfAvailable();
  }, 1500);
}

async function connectIfAvailable() {
  await refreshUiLanguage();
  if (es) return;
  const ok = await isServerAvailable();
  if (!ok) {
    setCurrentStatus("disconnectedWaiting", true);
    scheduleReconnect();
    return;
  }
  connect();
}

function connect() {
  if (es) return;
  es = new EventSource("/sse/return");
  es.onopen = function () {
    void fetchSnapshot();
    void fetchUtilitySnapshot();
    void fetchAudioSnapshot();
    connectAlert();
    connectVideo();
  };
  es.onmessage = function (event) {
    try {
      handleReturnStreamMessage(JSON.parse(event.data));
    } catch (_) {}
  };
  es.onerror = function () {
    if (es) {
      es.close();
      es = null;
    }
    setCurrentStatus("disconnectedReconnecting", true);
    scheduleReconnect();
  };
}

applyStaticText();
resetPanel("cur");
resetPanel("next");
setCurrentStatus("waitingContent", false);
document.getElementById("next-empty").textContent = tr("noNextSlide");
updateClock();
clockTimer = setInterval(updateClock, 1000);
void connectIfAvailable();
setInterval(function() { void refreshUiLanguage(); }, 30000);

window.addEventListener("beforeunload", function () {
  if (clockTimer) clearInterval(clockTimer);
  if (reconnectTimer) clearTimeout(reconnectTimer);
  if (es) es.close();
  if (alertEs) alertEs.close();
  if (videoEs) videoEs.close();
});
</script>
