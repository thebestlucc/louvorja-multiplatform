# Use rust-lld on Windows — bundled with rustup, no extra install.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"

[target.i686-pc-windows-msvc]
linker = "rust-lld"

# Use mold on Linux CI — ~63% faster link times vs GNU ld.
# Requires `rui314/setup-mold@v1` step in the workflow (see setup-tauri-ci action).
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
