name: pr-build

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app sources
        uses: actions/checkout@v6.0.2
        with:
          filter: blob:none
          sparse-checkout: |
            .github
            global.css
            index.html
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            public
            remote-pwa
            src
            tests
            tsconfig.json
            tsconfig.node.json
            tsconfig.unit-tests.json
            vite.config.ts
          sparse-checkout-cone-mode: false
      - uses: ./.github/actions/setup-tauri-ci
        with:
          setup-rust: "false"
          install-linux-deps: "false"
      - name: Build frontend
        shell: bash
        run: pnpm build
      - name: Run root unit tests
        shell: bash
        run: pnpm test:unit
      - name: Run remote-pwa tests
        shell: bash
        run: pnpm --filter remote-pwa test -- --run
      - name: Upload frontend dist
        uses: actions/upload-artifact@v7.0.0
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  rust-checks:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - name: Checkout app sources
        uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup-tauri-ci
      - name: Build remote-pwa (required by include_dir! in src/remote/assets.rs)
        shell: bash
        run: pnpm --filter remote-pwa build
      - name: Verify commands.toml matches collect_commands!
        shell: bash
        run: node .github/scripts/check-commands-toml.mjs
      - name: Rust check
        shell: bash
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml
      - name: Run Rust tests
        shell: bash
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

  tauri-build:
    needs:
      - frontend-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            cache_suffix: "universal"
          - name: linux-x86_64
            platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            cache_suffix: ""
          - name: linux-aarch64
            platform: ubuntu-22.04-arm
            args: ""
            rust_targets: ""
            cache_suffix: ""
          - name: windows-x86_64
            platform: windows-latest
            args: ""
            rust_targets: ""
            cache_suffix: ""
          - name: windows-x86
            platform: windows-latest
            args: "--target i686-pc-windows-msvc"
            rust_targets: "i686-pc-windows-msvc"
            cache_suffix: "x86"
    runs-on: ${{ matrix.platform }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - name: Checkout app sources
        uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup-tauri-ci
        with:
          rust-targets: ${{ matrix.rust_targets }}
          cache-suffix: ${{ matrix.cache_suffix }}
      - name: Download frontend dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: frontend-dist
          path: dist
      - name: Build remote-pwa (required by include_dir! in src/remote/assets.rs)
        shell: bash
        run: pnpm --filter remote-pwa build
      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}
