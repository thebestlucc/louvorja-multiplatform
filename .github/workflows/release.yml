name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app sources
        uses: actions/checkout@v4
        with:
          filter: blob:none
          sparse-checkout: |
            .github
            global.css
            index.html
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            public
            src
            tsconfig.json
            tsconfig.node.json
            vite.config.ts
          sparse-checkout-cone-mode: false
      - uses: ./.github/actions/setup-tauri-ci
        with:
          setup-rust: "false"
          install-linux-deps: "false"
      - name: Build frontend
        shell: bash
        run: pnpm build
      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app sources
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-tauri-ci
        with:
          setup-node: "false"
          install-frontend-deps: "false"
      - name: Seed presentation bridge sidecar placeholder
        shell: bash
        run: |
          triple="$(rustc -vV | sed -n 's/^host: //p')"
          mkdir -p src-tauri/binaries
          case "$triple" in
            *windows*) touch "src-tauri/binaries/presentation-bridge-${triple}.exe" ;;
            *) touch "src-tauri/binaries/presentation-bridge-${triple}" ;;
          esac
      - name: Rust check
        shell: bash
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

  tauri-release:
    needs:
      - frontend-checks
      - rust-checks
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            target_triple: "aarch64-apple-darwin"
          - name: macos-x86_64
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            target_triple: "x86_64-apple-darwin"
          - name: linux-x86_64
            platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            target_triple: "x86_64-unknown-linux-gnu"
          - name: linux-aarch64
            platform: ubuntu-22.04-arm
            args: ""
            rust_targets: ""
            target_triple: "aarch64-unknown-linux-gnu"
          - name: windows-x86_64
            platform: windows-latest
            args: ""
            rust_targets: ""
            target_triple: "x86_64-pc-windows-msvc"
    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout app sources
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-tauri-ci
        with:
          rust-targets: ${{ matrix.rust_targets }}
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
      - name: Inject updater endpoint and public key
        shell: bash
        env:
          TAURI_UPDATER_ENDPOINT: ${{ secrets.TAURI_UPDATER_ENDPOINT }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SKIP_FRONTEND_BUILD: "true"
        run: node .github/scripts/inject-updater-config.mjs
      - name: Build presentation bridge sidecar
        shell: bash
        env:
          SIDE_CAR_TARGET_TRIPLE: ${{ matrix.target_triple }}
        run: node scripts/prepare-sidecar.mjs --release
      - name: Build and publish bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LouvorJA ${{ github.ref_name }}"
          releaseBody: "Automated release for ${{ github.ref_name }}."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
