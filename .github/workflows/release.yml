name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm exec tsc --noEmit
      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml
      - name: Build frontend
        run: pnpm exec vite build

  tauri-release:
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_ENDPOINT: ${{ secrets.TAURI_UPDATER_ENDPOINT }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Inject updater endpoint and public key
        run: node .github/scripts/inject-updater-config.mjs
      - name: Build and publish bundles
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LouvorJA ${{ github.ref_name }}"
          releaseBody: "Automated release for ${{ github.ref_name }}."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
