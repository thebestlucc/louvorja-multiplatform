name: release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app sources
        uses: actions/checkout@v6.0.2
        with:
          filter: blob:none
          sparse-checkout: |
            .github
            global.css
            index.html
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            public
            remote-pwa
            src
            tests
            tsconfig.json
            tsconfig.node.json
            tsconfig.unit-tests.json
            vite.config.ts
          sparse-checkout-cone-mode: false
      - uses: ./.github/actions/setup-tauri-ci
        with:
          setup-rust: "false"
          install-linux-deps: "false"
      - name: Build frontend
        shell: bash
        run: pnpm build
      - name: Run root unit tests
        shell: bash
        continue-on-error: true # TODO: remove after fixing pre-existing tsc errors in tests/ (SlideContent.text, ScheduleDepartment.description)
        run: pnpm test:unit
      - name: Run remote-pwa tests
        shell: bash
        continue-on-error: true # TODO: remove after fixing 15 pre-existing routing/waitFor timeouts
        run: pnpm --filter remote-pwa install --frozen-lockfile && pnpm --filter remote-pwa test -- --run
      - name: Upload frontend dist
        uses: actions/upload-artifact@v7.0.0
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  rust-checks:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - name: Checkout app sources
        uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup-tauri-ci
        with:
          setup-node: "false"
          install-frontend-deps: "false"
      - name: Rust check
        shell: bash
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml
      - name: Rust tests
        shell: bash
        continue-on-error: true # TODO: remove after fixing pre-existing extract_zip_skips_directory_entries_and_path_traversal test
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

  tauri-release:
    needs:
      - frontend-checks
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            cache_suffix: "universal"
          - name: linux-x86_64
            platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            cache_suffix: ""
          - name: linux-aarch64
            platform: ubuntu-22.04-arm
            args: ""
            rust_targets: ""
            cache_suffix: ""
          - name: windows-x86_64
            platform: windows-latest
            args: ""
            rust_targets: ""
            cache_suffix: ""
          - name: windows-x86
            platform: windows-latest
            args: "--target i686-pc-windows-msvc"
            rust_targets: "i686-pc-windows-msvc"
            cache_suffix: "x86"
    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      CDN_MANIFEST_URL: ${{ vars.CDN_MANIFEST_URL }}
      # Disable incremental compilation (useless on clean CI, adds overhead)
      CARGO_INCREMENTAL: "0"
      # No debug symbols in test/check binaries (significant size + time reduction)
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - name: Checkout app sources
        uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup-tauri-ci
        with:
          rust-targets: ${{ matrix.rust_targets }}
          cache-suffix: ${{ matrix.cache_suffix }}
      - name: Download frontend dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: frontend-dist
          path: dist
      - name: Inject updater endpoint and public key
        shell: bash
        env:
          TAURI_UPDATER_ENDPOINT: ${{ secrets.TAURI_UPDATER_ENDPOINT }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SKIP_FRONTEND_BUILD: "true"
        run: node .github/scripts/inject-updater-config.mjs
      - name: Build and publish bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LouvorJA ${{ github.ref_name }}"
          releaseBody: "Automated release for ${{ github.ref_name }}."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
