name: Setup Tauri CI
description: Shared CI setup for LouvorJA release jobs.

inputs:
  setup-node:
    description: Install pnpm and Node.js.
    required: false
    default: "true"
  install-frontend-deps:
    description: Install frontend dependencies with pnpm.
    required: false
    default: "true"
  setup-rust:
    description: Install the Rust toolchain and restore the Rust cache.
    required: false
    default: "true"
  rust-targets:
    description: Additional Rust targets to install.
    required: false
    default: ""
  install-linux-deps:
    description: Install Linux system packages required for Tauri builds.
    required: false
    default: "true"
  cache-suffix:
    description: Extra suffix appended to the Rust cache shared-key. Use for cross-compiled targets to avoid cache collisions between jobs on the same OS.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup pnpm
      if: ${{ inputs.setup-node == 'true' }}
      uses: pnpm/action-setup@v5.0.0
      with:
        run_install: false

    - name: Setup Node.js
      if: ${{ inputs.setup-node == 'true' }}
      uses: actions/setup-node@v6.3.0
      with:
        node-version: 22
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Setup Rust toolchain
      if: ${{ inputs.setup-rust == 'true' && inputs.rust-targets == '' }}
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Rust toolchain with extra targets
      if: ${{ inputs.setup-rust == 'true' && inputs.rust-targets != '' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-targets }}

    - name: Restore Rust cache
      if: ${{ inputs.setup-rust == 'true' }}
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./src-tauri -> target"
        # Native jobs share cache per OS; cross-compiled jobs add a suffix to avoid collisions
        shared-key: "tauri-${{ runner.os }}${{ inputs.cache-suffix != '' && format('-{0}', inputs.cache-suffix) || '' }}"
        save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
        # Keep cache even on failed builds so partial compilation is reusable next run
        cache-on-failure: true

    - name: Install Linux system dependencies
      if: ${{ inputs.install-linux-deps == 'true' && runner.os == 'Linux' }}
      shell: bash
      run: |
        set -x
        # The Azure mirror used by ubuntu-22.04 / -arm runner images has
        # documented sync lag (actions/runner-images#8846, #9768, #7210) —
        # apt sees 404 / Hash Sum mismatch on packages that exist on the
        # canonical mirror. Rewrite every sources.list entry that points at
        # Azure to use archive.ubuntu.com directly. apt only reads
        # /etc/apt/sources.list and /etc/apt/sources.list.d/* — modifying
        # /etc/apt/apt-mirrors.txt does NOT change apt's behavior.
        sudo find /etc/apt -type f \( -name 'sources.list' -o -name '*.list' -o -name '*.sources' \) -print -exec sudo sed -i \
          -e 's|http://azure\.archive\.ubuntu\.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
          -e 's|https://azure\.archive\.ubuntu\.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
          {} +
        # Dump the post-edit state for diagnostic visibility
        grep -RhE '^(deb|URIs)' /etc/apt/sources.list /etc/apt/sources.list.d/ 2>/dev/null | sort -u || true

        # Lock-resilient prep (background unattended-upgrades + half-configured dpkg)
        sudo systemctl stop unattended-upgrades.service 2>/dev/null || true
        sudo killall -q unattended-upgr unattended-upgrades 2>/dev/null || true
        sudo dpkg --configure -a || true

        # Retry update — jammy mirror is flaky
        for i in 1 2 3; do
          sudo apt-get update -o Acquire::Retries=3 && break
          sleep $((i * 5))
        done

        # libsoup-3.0-dev + libjavascriptcoregtk-4.1-dev are Depends of
        # libwebkit2gtk-4.1-dev — apt resolves them. Listing explicitly on
        # jammy-arm sometimes selects a stale version from the Azure mirror.
        # Pattern verified against Moosync/Moosync release CI (Tauri 2 +
        # ubuntu-22.04 + ubuntu-22.04-arm, currently green).
        PACKAGES=(
          pkg-config libglib2.0-dev libgtk-3-dev librsvg2-dev patchelf
          libasound2-dev libssl-dev libxdo-dev xdg-utils clang
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev
          libwebkit2gtk-4.1-dev libayatana-appindicator3-dev
        )

        # Retry install — same mirror flakiness applies during fetch
        for i in 1 2 3; do
          if sudo apt-get install -y --no-install-recommends \
              -o DPkg::Lock::Timeout=120 "${PACKAGES[@]}"; then
            break
          fi
          [ "$i" = "3" ] && exit 1
          sleep $((i * 10))
          sudo apt-get update || true
        done

    - name: Install GStreamer (macOS)
      if: ${{ inputs.setup-rust == 'true' && runner.os == 'macOS' }}
      shell: bash
      run: |
        # Official universal pkg (includes both arm64 and x86_64 slices) — required
        # for universal-apple-darwin builds. Homebrew only ships host-arch builds.
        # URL path is /macos/ (the /osx/ path is the legacy mirror; /macos/ is
        # what current 1.24.x uploads use).
        GST_VERSION="1.24.13"
        TMP="$(mktemp -d)"
        curl -fL --retry 3 -o "${TMP}/runtime.pkg" \
          "https://gstreamer.freedesktop.org/data/pkg/macos/${GST_VERSION}/gstreamer-1.0-${GST_VERSION}-universal.pkg"
        curl -fL --retry 3 -o "${TMP}/devel.pkg" \
          "https://gstreamer.freedesktop.org/data/pkg/macos/${GST_VERSION}/gstreamer-1.0-devel-${GST_VERSION}-universal.pkg"
        sudo installer -pkg "${TMP}/runtime.pkg" -target /
        sudo installer -pkg "${TMP}/devel.pkg" -target /
        GST_PREFIX="/Library/Frameworks/GStreamer.framework/Versions/1.0"
        echo "PKG_CONFIG_PATH=${GST_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
        echo "${GST_PREFIX}/bin" >> "$GITHUB_PATH"

    - name: Install pkg-config + GStreamer (Windows)
      if: ${{ inputs.setup-rust == 'true' && runner.os == 'Windows' }}
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $ProgressPreference = "SilentlyContinue"  # IWR ~10x faster without progress UI

        $GST_VERSION = "1.24.13"
        $arch = if ("${{ inputs.cache-suffix }}" -eq "x86") { "x86" } else { "x86_64" }
        $gstRoot = if ($arch -eq "x86") { "C:\gstreamer\1.0\msvc_x86\" } else { "C:\gstreamer\1.0\msvc_x86_64\" }

        # NOTE: do NOT install chocolatey/pkgconfiglite — its SourceForge HTTP
        # download is broken on windows-2025 (ROCm/TheRock#2898, numpy#30187).
        # Strawberry Perl's bundled pkg-config.bat was removed (runner-images
        # #9693), so the runner has no pkg-config at all. The GStreamer dev MSI
        # ships its own pkg-config.exe at $gstRoot\bin\pkg-config.exe and the
        # gstreamer-rs README mandates it be FIRST on PATH ("other versions
        # have all kinds of quirks that will cause problems").

        Write-Host "==> Downloading GStreamer $GST_VERSION ($arch) MSIs"
        $runtime = "$env:RUNNER_TEMP\gstreamer-runtime.msi"
        $devel   = "$env:RUNNER_TEMP\gstreamer-devel.msi"
        $runtimeUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/$GST_VERSION/msvc/gstreamer-1.0-msvc-$arch-$GST_VERSION.msi"
        $develUrl   = "https://gstreamer.freedesktop.org/data/pkg/windows/$GST_VERSION/msvc/gstreamer-1.0-devel-msvc-$arch-$GST_VERSION.msi"
        Write-Host "  runtime: $runtimeUrl"
        Write-Host "  devel:   $develUrl"
        Invoke-WebRequest -Uri $runtimeUrl -OutFile $runtime -UseBasicParsing
        Invoke-WebRequest -Uri $develUrl   -OutFile $devel   -UseBasicParsing

        # msiexec exit codes: 0 = success, 3010 = success but reboot required
        # (harmless on CI, the runner is ephemeral). Anything else is a real
        # error — 1602=user cancel, 1603=fatal, 1618=another install in
        # progress, etc.
        function Invoke-Msi($msi, $label) {
          Write-Host "==> Installing GStreamer $label"
          $p = Start-Process msiexec.exe -Wait -PassThru -ArgumentList `
            '/i', $msi, '/quiet', '/qn', '/norestart', 'ADDLOCAL=ALL'
          if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) {
            throw "msiexec $label failed (ExitCode=$($p.ExitCode))"
          }
          Write-Host "  msiexec $label exit=$($p.ExitCode)"
        }
        Invoke-Msi $runtime "runtime"
        Invoke-Msi $devel   "devel"

        # Verify both the bundled pkg-config and the .pc files are present.
        $bundledPkgConfig = "$($gstRoot)bin\pkg-config.exe"
        if (!(Test-Path $bundledPkgConfig)) {
          Write-Host "ERROR: $bundledPkgConfig not found — listing $($gstRoot)bin:"
          Get-ChildItem "$($gstRoot)bin" -ErrorAction SilentlyContinue | Select-Object -First 50 Name
          throw "GStreamer bundled pkg-config.exe missing"
        }
        Write-Host "  bundled pkg-config: $bundledPkgConfig"

        if (!(Test-Path "$($gstRoot)lib\pkgconfig\gstreamer-1.0.pc")) {
          Write-Host "ERROR: gstreamer-1.0.pc not found under $gstRoot — listing install dirs:"
          Get-ChildItem "C:\gstreamer" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 50 FullName
          throw "GStreamer devel headers were not installed at expected path"
        }

        # PKG_CONFIG_ALLOW_CROSS=1 is required for the i686 cross from x86_64 host;
        # harmless on native.
        echo "PKG_CONFIG_PATH=$($gstRoot)lib\pkgconfig" >> $env:GITHUB_ENV
        echo "PKG_CONFIG_ALLOW_CROSS=1" >> $env:GITHUB_ENV
        # GStreamer\bin FIRST on PATH — gstreamer-rs requires its bundled
        # pkg-config to win over any other one (which there shouldn't be on
        # windows-2025, but defensive).
        echo "$($gstRoot)bin" >> $env:GITHUB_PATH

    - name: Install mold linker (Linux)
      if: ${{ inputs.install-linux-deps == 'true' && runner.os == 'Linux' }}
      uses: rui314/setup-mold@v1

    - name: Install frontend dependencies
      if: ${{ inputs.install-frontend-deps == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
