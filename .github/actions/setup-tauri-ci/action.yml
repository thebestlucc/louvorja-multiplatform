name: Setup Tauri CI
description: Shared CI setup for LouvorJA release jobs.

inputs:
  setup-node:
    description: Install pnpm and Node.js.
    required: false
    default: "true"
  install-frontend-deps:
    description: Install frontend dependencies with pnpm.
    required: false
    default: "true"
  setup-rust:
    description: Install the Rust toolchain and restore the Rust cache.
    required: false
    default: "true"
  rust-targets:
    description: Additional Rust targets to install.
    required: false
    default: ""
  install-linux-deps:
    description: Install Linux system packages required for Tauri builds.
    required: false
    default: "true"
  cache-suffix:
    description: Extra suffix appended to the Rust cache shared-key. Use for cross-compiled targets to avoid cache collisions between jobs on the same OS.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup pnpm
      if: ${{ inputs.setup-node == 'true' }}
      uses: pnpm/action-setup@v5.0.0
      with:
        run_install: false

    - name: Setup Node.js
      if: ${{ inputs.setup-node == 'true' }}
      uses: actions/setup-node@v6.3.0
      with:
        node-version: 22
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Setup Rust toolchain
      if: ${{ inputs.setup-rust == 'true' && inputs.rust-targets == '' }}
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Rust toolchain with extra targets
      if: ${{ inputs.setup-rust == 'true' && inputs.rust-targets != '' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-targets }}

    - name: Restore Rust cache
      if: ${{ inputs.setup-rust == 'true' }}
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./src-tauri -> target"
        # Native jobs share cache per OS; cross-compiled jobs add a suffix to avoid collisions
        shared-key: "tauri-${{ runner.os }}${{ inputs.cache-suffix != '' && format('-{0}', inputs.cache-suffix) || '' }}"
        save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
        # Keep cache even on failed builds so partial compilation is reusable next run
        cache-on-failure: true

    - name: Install Linux system dependencies
      if: ${{ inputs.install-linux-deps == 'true' && runner.os == 'Linux' }}
      shell: bash
      run: |
        set -x
        sudo apt-get update
        # Install in two groups so a missing package in one group still leaves
        # a useful log of which group succeeded.
        sudo apt-get install -y --no-install-recommends \
          pkg-config \
          libglib2.0-dev \
          libgtk-3-dev \
          librsvg2-dev \
          patchelf \
          libasound2-dev \
          libssl-dev \
          libxdo-dev \
          xdg-utils \
          clang \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libgstreamer-plugins-bad1.0-dev
        sudo apt-get install -y --no-install-recommends \
          libwebkit2gtk-4.1-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev \
          libappindicator3-dev

    - name: Install GStreamer (macOS)
      if: ${{ inputs.setup-rust == 'true' && runner.os == 'macOS' }}
      shell: bash
      run: |
        # Official universal pkg (includes both arm64 and x86_64 slices) — required
        # for universal-apple-darwin builds. Homebrew only ships host-arch builds.
        # URL path is /macos/ (the /osx/ path is the legacy mirror; /macos/ is
        # what current 1.24.x uploads use).
        GST_VERSION="1.24.13"
        TMP="$(mktemp -d)"
        curl -fL --retry 3 -o "${TMP}/runtime.pkg" \
          "https://gstreamer.freedesktop.org/data/pkg/macos/${GST_VERSION}/gstreamer-1.0-${GST_VERSION}-universal.pkg"
        curl -fL --retry 3 -o "${TMP}/devel.pkg" \
          "https://gstreamer.freedesktop.org/data/pkg/macos/${GST_VERSION}/gstreamer-1.0-devel-${GST_VERSION}-universal.pkg"
        sudo installer -pkg "${TMP}/runtime.pkg" -target /
        sudo installer -pkg "${TMP}/devel.pkg" -target /
        GST_PREFIX="/Library/Frameworks/GStreamer.framework/Versions/1.0"
        echo "PKG_CONFIG_PATH=${GST_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
        echo "${GST_PREFIX}/bin" >> "$GITHUB_PATH"

    - name: Install pkg-config + GStreamer (Windows)
      if: ${{ inputs.setup-rust == 'true' && runner.os == 'Windows' }}
      shell: pwsh
      run: |
        $GST_VERSION = "1.24.13"
        $arch = if ("${{ inputs.cache-suffix }}" -eq "x86") { "x86" } else { "x86_64" }
        $gstRoot = if ($arch -eq "x86") { "C:\gstreamer\1.0\msvc_x86\" } else { "C:\gstreamer\1.0\msvc_x86_64\" }

        # pkg-config binary on PATH (glib-sys / gdk-sys / gstreamer-sys all probe it)
        choco install --yes --no-progress pkgconfiglite

        # GStreamer runtime + devel (devel ships glib-2.0.pc, gstreamer-1.0.pc, etc.)
        $runtime = "$env:RUNNER_TEMP\gstreamer-runtime.msi"
        $devel   = "$env:RUNNER_TEMP\gstreamer-devel.msi"
        Invoke-WebRequest -Uri "https://gstreamer.freedesktop.org/data/pkg/windows/$GST_VERSION/msvc/gstreamer-1.0-msvc-$arch-$GST_VERSION.msi" -OutFile $runtime
        Invoke-WebRequest -Uri "https://gstreamer.freedesktop.org/data/pkg/windows/$GST_VERSION/msvc/gstreamer-1.0-devel-msvc-$arch-$GST_VERSION.msi" -OutFile $devel
        Start-Process msiexec.exe -Wait -ArgumentList '/i', $runtime, '/quiet', '/qn', '/norestart', 'ADDLOCAL=ALL'
        Start-Process msiexec.exe -Wait -ArgumentList '/i', $devel,   '/quiet', '/qn', '/norestart', 'ADDLOCAL=ALL'

        # Env for build script + linker. PKG_CONFIG_ALLOW_CROSS=1 is required for
        # the i686-pc-windows-msvc cross from the x86_64 host; harmless on native.
        echo "PKG_CONFIG_PATH=$($gstRoot)lib\pkgconfig" >> $env:GITHUB_ENV
        echo "PKG_CONFIG_ALLOW_CROSS=1" >> $env:GITHUB_ENV
        echo "$($gstRoot)bin" >> $env:GITHUB_PATH

    - name: Install mold linker (Linux)
      if: ${{ inputs.install-linux-deps == 'true' && runner.os == 'Linux' }}
      uses: rui314/setup-mold@v1

    - name: Install frontend dependencies
      if: ${{ inputs.install-frontend-deps == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
