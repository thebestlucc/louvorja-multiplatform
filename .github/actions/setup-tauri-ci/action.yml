name: Setup Tauri CI
description: Shared CI setup for LouvorJA release jobs.

inputs:
  setup-node:
    description: Install pnpm and Node.js.
    required: false
    default: "true"
  install-frontend-deps:
    description: Install frontend dependencies with pnpm.
    required: false
    default: "true"
  setup-rust:
    description: Install the Rust toolchain and restore the Rust cache.
    required: false
    default: "true"
  rust-targets:
    description: Additional Rust targets to install.
    required: false
    default: ""
  install-linux-deps:
    description: Install Linux system packages required for Tauri builds.
    required: false
    default: "true"
  cache-suffix:
    description: Extra suffix appended to the Rust cache shared-key. Use for cross-compiled targets to avoid cache collisions between jobs on the same OS.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup pnpm
      if: ${{ inputs.setup-node == 'true' }}
      uses: pnpm/action-setup@v5.0.0
      with:
        run_install: false

    - name: Setup Node.js
      if: ${{ inputs.setup-node == 'true' }}
      uses: actions/setup-node@v6.3.0
      with:
        node-version: 22
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Setup Rust toolchain
      if: ${{ inputs.setup-rust == 'true' && inputs.rust-targets == '' }}
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Rust toolchain with extra targets
      if: ${{ inputs.setup-rust == 'true' && inputs.rust-targets != '' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-targets }}

    - name: Restore Rust cache
      if: ${{ inputs.setup-rust == 'true' }}
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./src-tauri -> target"
        # Native jobs share cache per OS; cross-compiled jobs add a suffix to avoid collisions
        shared-key: "tauri-${{ runner.os }}${{ inputs.cache-suffix != '' && format('-{0}', inputs.cache-suffix) || '' }}"
        save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
        # Keep cache even on failed builds so partial compilation is reusable next run
        cache-on-failure: true

    - name: Install Linux system dependencies
      if: ${{ inputs.install-linux-deps == 'true' && runner.os == 'Linux' }}
      shell: bash
      run: |
        set -x
        # Some runner images leave unattended-upgrades or dpkg in a half-configured
        # state — make installs lock-resilient before doing anything.
        sudo systemctl stop unattended-upgrades.service 2>/dev/null || true
        sudo killall -q unattended-upgr unattended-upgrades 2>/dev/null || true
        sudo dpkg --configure -a || true

        sudo apt-get update

        PACKAGES=(
          pkg-config libglib2.0-dev libgtk-3-dev librsvg2-dev patchelf
          libasound2-dev libssl-dev libxdo-dev xdg-utils clang
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev
          libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
          libayatana-appindicator3-dev
        )

        # Diagnostic: print availability per-package BEFORE the install so the next
        # CI log identifies any package the runner's apt cache can't resolve.
        echo "=== Package availability ($(lsb_release -ds 2>/dev/null || uname -a)) ==="
        missing=0
        for pkg in "${PACKAGES[@]}"; do
          if apt-cache show "$pkg" >/dev/null 2>&1; then
            cand=$(apt-cache policy "$pkg" 2>/dev/null | awk -F': ' '/Candidate/ {print $2}')
            printf '  OK:      %-40s %s\n' "$pkg" "$cand"
          else
            printf '  MISSING: %s\n' "$pkg"
            missing=$((missing + 1))
          fi
        done
        if [ "$missing" -gt 0 ]; then
          echo "ERROR: $missing package(s) not in apt cache — aborting before install"
          exit 1
        fi

        sudo apt-get install -y --no-install-recommends \
          -o DPkg::Lock::Timeout=120 \
          "${PACKAGES[@]}"

    - name: Install GStreamer (macOS)
      if: ${{ inputs.setup-rust == 'true' && runner.os == 'macOS' }}
      shell: bash
      run: |
        # Official universal pkg (includes both arm64 and x86_64 slices) — required
        # for universal-apple-darwin builds. Homebrew only ships host-arch builds.
        # URL path is /macos/ (the /osx/ path is the legacy mirror; /macos/ is
        # what current 1.24.x uploads use).
        GST_VERSION="1.24.13"
        TMP="$(mktemp -d)"
        curl -fL --retry 3 -o "${TMP}/runtime.pkg" \
          "https://gstreamer.freedesktop.org/data/pkg/macos/${GST_VERSION}/gstreamer-1.0-${GST_VERSION}-universal.pkg"
        curl -fL --retry 3 -o "${TMP}/devel.pkg" \
          "https://gstreamer.freedesktop.org/data/pkg/macos/${GST_VERSION}/gstreamer-1.0-devel-${GST_VERSION}-universal.pkg"
        sudo installer -pkg "${TMP}/runtime.pkg" -target /
        sudo installer -pkg "${TMP}/devel.pkg" -target /
        GST_PREFIX="/Library/Frameworks/GStreamer.framework/Versions/1.0"
        echo "PKG_CONFIG_PATH=${GST_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
        echo "${GST_PREFIX}/bin" >> "$GITHUB_PATH"

    - name: Install pkg-config + GStreamer (Windows)
      if: ${{ inputs.setup-rust == 'true' && runner.os == 'Windows' }}
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $ProgressPreference = "SilentlyContinue"  # IWR ~10x faster without progress UI

        $GST_VERSION = "1.24.13"
        $arch = if ("${{ inputs.cache-suffix }}" -eq "x86") { "x86" } else { "x86_64" }
        $gstRoot = if ($arch -eq "x86") { "C:\gstreamer\1.0\msvc_x86\" } else { "C:\gstreamer\1.0\msvc_x86_64\" }

        Write-Host "==> Ensuring pkg-config is on PATH"
        $pkgConfig = Get-Command pkg-config -ErrorAction SilentlyContinue
        if (!$pkgConfig) {
          Write-Host "  pkg-config not on PATH — installing pkgconfiglite via choco"
          choco install --yes --no-progress pkgconfiglite
          if ($LASTEXITCODE -ne 0) { throw "choco install pkgconfiglite failed (LASTEXITCODE=$LASTEXITCODE)" }
          # Refresh PATH in current session so subsequent commands find it
          $env:PATH = "C:\ProgramData\chocolatey\bin;$env:PATH"
          $pkgConfig = Get-Command pkg-config -ErrorAction SilentlyContinue
          if (!$pkgConfig) { throw "pkg-config still not on PATH after choco install" }
        }
        Write-Host "  pkg-config: $($pkgConfig.Source)"

        Write-Host "==> Downloading GStreamer $GST_VERSION ($arch) MSIs"
        $runtime = "$env:RUNNER_TEMP\gstreamer-runtime.msi"
        $devel   = "$env:RUNNER_TEMP\gstreamer-devel.msi"
        $runtimeUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/$GST_VERSION/msvc/gstreamer-1.0-msvc-$arch-$GST_VERSION.msi"
        $develUrl   = "https://gstreamer.freedesktop.org/data/pkg/windows/$GST_VERSION/msvc/gstreamer-1.0-devel-msvc-$arch-$GST_VERSION.msi"
        Write-Host "  runtime: $runtimeUrl"
        Write-Host "  devel:   $develUrl"
        Invoke-WebRequest -Uri $runtimeUrl -OutFile $runtime -UseBasicParsing
        Invoke-WebRequest -Uri $develUrl   -OutFile $devel   -UseBasicParsing

        Write-Host "==> Installing GStreamer runtime"
        $p = Start-Process msiexec.exe -Wait -PassThru -ArgumentList '/i', $runtime, '/quiet', '/qn', '/norestart', 'ADDLOCAL=ALL'
        if ($p.ExitCode -ne 0) { throw "msiexec runtime failed ($($p.ExitCode))" }
        Write-Host "==> Installing GStreamer devel"
        $p = Start-Process msiexec.exe -Wait -PassThru -ArgumentList '/i', $devel,   '/quiet', '/qn', '/norestart', 'ADDLOCAL=ALL'
        if ($p.ExitCode -ne 0) { throw "msiexec devel failed ($($p.ExitCode))" }

        if (!(Test-Path "$($gstRoot)lib\pkgconfig\gstreamer-1.0.pc")) {
          Write-Host "ERROR: gstreamer-1.0.pc not found under $gstRoot — listing install dirs:"
          Get-ChildItem "C:\gstreamer" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 50 FullName
          throw "GStreamer devel headers were not installed at expected path"
        }

        # PKG_CONFIG_ALLOW_CROSS=1 is required for the i686 cross from x86_64 host;
        # harmless on native. Env var name uses dot replacement (system-deps convention).
        echo "PKG_CONFIG_PATH=$($gstRoot)lib\pkgconfig" >> $env:GITHUB_ENV
        echo "PKG_CONFIG_ALLOW_CROSS=1" >> $env:GITHUB_ENV
        echo "$($gstRoot)bin" >> $env:GITHUB_PATH

    - name: Install mold linker (Linux)
      if: ${{ inputs.install-linux-deps == 'true' && runner.os == 'Linux' }}
      uses: rui314/setup-mold@v1

    - name: Install frontend dependencies
      if: ${{ inputs.install-frontend-deps == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
